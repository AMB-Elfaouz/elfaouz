/* Simple SVG Charts — no external dependency */
function SimpleBar({data,keyX,keyY,keyY2,height=180}){
  if(!data||data.length===0)return null;
  const max=Math.max(...data.map(d=>Math.max(d[keyY]||0,d[keyY2]||0)));
  const barW=Math.floor(280/data.length/2);
  return <svg viewBox={`0 0 320 ${height+30}`} className="w-full" style={{maxHeight:height+30}}>
    {data.map((d,i)=>{const x=20+i*(320-40)/data.length;const h1=max>0?(d[keyY]/max)*(height-20):0;const h2=keyY2&&max>0?(d[keyY2]/max)*(height-20):0;
      return <g key={i}>{keyY2&&<rect x={x} y={height-h2} width={barW} height={h2} fill="#e5e7eb" rx="3"/>}
        <rect x={keyY2?x+barW+2:x} y={height-h1} width={barW} height={h1} fill="#047857" rx="3"/>
        <text x={x+barW} y={height+15} textAnchor="middle" fontSize="9" fill="#666">{d[keyX]}</text></g>})}
  </svg>;
}
function SimplePie({data,height=180}){
  if(!data||data.length===0)return <p className="text-sm text-gray-400 text-center py-8">Aucun paiement</p>;
  const total=data.reduce((s,d)=>s+d.value,0);if(total===0)return null;let cum=0;
  const colors=["#047857","#d97706","#2563eb","#7c3aed","#dc2626"];
  return <div className="flex items-center gap-4"><svg viewBox="0 0 120 120" style={{width:120,height:120}}>
    {data.map((d,i)=>{const pct=d.value/total;const start=cum;cum+=pct;const x1=60+50*Math.cos(2*Math.PI*start-Math.PI/2);const y1=60+50*Math.sin(2*Math.PI*start-Math.PI/2);
      const x2=60+50*Math.cos(2*Math.PI*cum-Math.PI/2);const y2=60+50*Math.sin(2*Math.PI*cum-Math.PI/2);const large=pct>0.5?1:0;
      return <path key={i} d={`M60,60 L${x1},${y1} A50,50 0 ${large},1 ${x2},${y2} Z`} fill={colors[i%colors.length]}/>})}
    <circle cx="60" cy="60" r="28" fill="white"/></svg>
    <div className="space-y-1">{data.map((d,i)=><div key={i} className="flex items-center gap-2 text-xs"><div className="w-3 h-3 rounded" style={{backgroundColor:colors[i%colors.length]}}/><span>{d.name}: {d.value}€</span></div>)}</div></div>;
}

  isConfigured:()=>_fbConfigured&&!!_auth,
  // Connexion email/mot de passe Firebase
  signIn:async(email,password)=>{
    if(!_auth)return{ok:false,error:"Firebase non configuré"};
    try{await _auth.signInWithEmailAndPassword(email,password);return{ok:true}}
    catch(e){
      const msgs={"auth/user-not-found":"Email inconnu","auth/wrong-password":"Mot de passe incorrect","auth/invalid-email":"Email invalide","auth/too-many-requests":"Trop de tentatives, réessayez plus tard","auth/invalid-credential":"Email ou mot de passe incorrect"};
      return{ok:false,error:msgs[e.code]||"Erreur de connexion"}}},
  signOut:async()=>{if(_auth)await _auth.signOut()},
  // Créer un compte (admin uniquement)
  createUser:async(email,password)=>{
    if(!_auth)return{ok:false,error:"Firebase non configuré"};
    try{await _auth.createUserWithEmailAndPassword(email,password);await _auth.signOut();return{ok:true}}
    catch(e){
      const msgs={"auth/email-already-in-use":"Email déjà utilisé","auth/weak-password":"Mot de passe trop faible (6 car. min)","auth/invalid-email":"Email invalide"};
      return{ok:false,error:msgs[e.code]||e.message}}},
  // Envoyer email reset mot de passe
  resetPassword:async(email)=>{
    if(!_auth)return{ok:false,error:"Firebase non configuré"};
    try{await _auth.sendPasswordResetEmail(email);return{ok:true}}
    catch(e){return{ok:false,error:"Email inconnu ou invalide"}}},
  currentUser:()=>_auth?._auth?.currentUser||null,
  onAuthChange:(cb)=>{if(!_auth)return()=>{};return _auth.onAuthStateChanged(cb)},
};
const DB={
  isConfigured:()=>_fbConfigured&&!!_db,
  save:async(data,writeId)=>{if(!_db)return false;try{
    const payload=writeId?{...data,_writeId:writeId}:data;
    await _db.collection("ef_data").doc("main").set(payload);return true
  }catch(e){console.error("DB save:",e);return false}},
  load:async()=>{if(!_db)return null;try{
    const doc=await _db.collection("ef_data").doc("main").get();
    return doc.exists?doc.data():null;
  }catch(e){console.error("DB load:",e);return null}},
  listen:(cb)=>{if(!_db)return()=>{};try{
    return _db.collection("ef_data").doc("main").onSnapshot(
      doc=>{if(doc.exists)cb(doc.data())},
      err=>{console.error("❌ Listener Firestore erreur:",err.code,err.message);}
    )
  }catch(e){console.error("❌ Listener setup erreur:",e);return()=>{}}},
  // Méta-comptes : stocke les infos rôle/nom liés à l'uid Firebase
  saveUserMeta:async(uid,meta)=>{if(!_db)return;try{await _db.collection("ef_users").doc(uid).set(meta,{merge:true})}catch(e){console.error("saveUserMeta:",e)}},
  getUserMeta:async(uid)=>{if(!_db)return null;try{const d=await _db.collection("ef_users").doc(uid).get();return d.exists?d.data():null}catch(e){console.error("getUserMeta:",e);return null}},
  // Chercher par email dans tous les profils (uid inconnu)
  getUserByEmail:async(email)=>{if(!_db)return null;try{
    const snap=await _db.collection("ef_users").where("email","==",email.trim().toLowerCase()).limit(1).get();
    if(!snap.empty)return{uid:snap.docs[0].id,...snap.docs[0].data()};
    return null;
  }catch(e){console.error("getUserByEmail:",e);return null}},
  listUsers:async()=>{if(!_db)return[];try{const snap=await _db.collection("ef_users").get();return snap.docs.map(d=>({uid:d.id,...d.data()}))}catch(e){return[]}},
};
// Init Firebase différée — appelée au démarrage de l'app React
// pour s'assurer que les SDKs Firebase sont bien chargés
function ensureFirebaseInit(){
  if(_fbConfigured) return true; // déjà initialisé
  const cfg = EMBEDDED_FIREBASE_CONFIG || getFBConfig();
  if(!cfg || !cfg.apiKey) return false;
  if(!window.firebase) return false;
  const ok = initFirebase(cfg);
  if(ok && EMBEDDED_FIREBASE_CONFIG) saveFBConfig(EMBEDDED_FIREBASE_CONFIG);
  return ok;
}

function FirebaseUsersManager({D,set}){
  const {accounts}=D;
  const [showAdd,setShowAdd]=useState(false);
  const [form,setForm]=useState({email:"",name:"",role:"secretariat"});
  const [msg,setMsg]=useState("");const [loading,setLoading]=useState(false);
  const [refreshing,setRefreshing]=useState(false);
  // Afficher les accounts qui ont un email (= comptes Firebase)
  const fbUsers=accounts.filter(a=>a.email&&a.email.includes("@"));

  const roles=[{value:"admin",label:"Direction / Admin"},{value:"secretariat",label:"Secrétariat"},{value:"enseignant",label:"Enseignant"},{value:"benevole",label:"Bénévole"}];

  async function refreshUsers(){
    setRefreshing(true);setMsg("");
    try{
      const remoteData=await DB.load();
      if(remoteData&&remoteData.accounts){
        set.setAccounts(remoteData.accounts);
        const fbAccounts=remoteData.accounts.filter(a=>a.email&&a.email.includes("@"));
        setMsg("✅ "+fbAccounts.length+" profil(s) chargé(s) depuis Firebase.");
        setTimeout(()=>setMsg(""),5000);
      }else{
        setMsg("⚠️ Aucune donnée trouvée dans Firebase.");
      }
    }catch(e){setMsg("❌ Erreur : "+e.message);}
    setRefreshing(false);
  }

  async function createUser(){
    if(!form.email||!form.name){setMsg("❌ Email et nom requis.");return}
    setLoading(true);setMsg("");
    const emailLower=form.email.trim().toLowerCase();
    if(!emailLower.includes("@")){setMsg("❌ Email invalide.");setLoading(false);return}
    if(accounts.find(a=>(a.email||"").toLowerCase()===emailLower)){
      setMsg("❌ Un compte existe déjà pour cet email.");setLoading(false);return;
    }
    const newAccount={id:uid(),login:emailLower,password:"(Firebase Auth)",name:form.name,role:form.role,email:emailLower};
    // 1. Mise à jour React state (et localStorage via useEffect)
    const newAccounts=[...accounts,newAccount];
    set.setAccounts(newAccounts);
    // 2. Sauvegarde IMMÉDIATE dans Firestore — sans attendre le débounce
    // C'est crucial : si la page est fermée avant les 800ms, Firestore doit déjà avoir les données
    if(DB.isConfigured()){
      setMsg("⏳ Enregistrement dans Firebase…");
      const currentData=LS.get("data",null)||{};
      const wid=uid();
      const ok=await DB.save({...currentData,accounts:newAccounts},wid);
      if(!ok){setMsg("⚠️ Sauvegarde locale OK mais erreur Firebase. Réessayez.");setLoading(false);return}
    }
    setMsg("✅ Profil enregistré dans Firebase. Créez le compte dans Firebase Console → Authentication, puis cliquez 📧 Lien connexion.");
    setForm({email:"",name:"",role:"secretariat"});
    setLoading(false);
  }

  async function sendInvite(email){
    const res=await AUTH.resetPassword(email);
    setMsg(res.ok?"✅ Email d'activation envoyé à "+email:"❌ "+res.error+" — Vérifiez que le compte existe dans Firebase Console → Authentication.");
    setTimeout(()=>setMsg(""),5000);
  }

  async function changeRole(accountId, newRole){
    set.setAccounts(p=>p.map(a=>a.id===accountId?{...a,role:newRole}:a));
  }

  async function sendReset(email){
    const res=await AUTH.resetPassword(email);
    alert(res.ok?"✅ Email de réinitialisation envoyé à "+email:"❌ "+res.error);
  }

  if(!AUTH.isConfigured())return <div className="p-4 bg-amber-50 border border-amber-200 rounded-xl text-sm text-amber-800">
    <p className="font-bold mb-1">⚠ Firebase non configuré</p>
    <p>Configurez Firebase via le bouton ⚙ en haut pour gérer les comptes.</p></div>;

  return <div className="space-y-4">
    <div className="flex items-center justify-between">
      <p className="text-sm text-gray-500">{fbUsers.length} profil(s) enregistré(s)</p>
      <div className="flex gap-2">
        <Btn size="sm" variant="secondary" onClick={refreshUsers} disabled={refreshing}>{refreshing?"⏳ Chargement…":"🔄 Rafraîchir"}</Btn>
        <Btn size="sm" onClick={()=>setShowAdd(true)}>＋ Ajouter un utilisateur</Btn>
      </div>
    </div>
    <div className="p-3 bg-amber-50 border border-amber-200 rounded-lg text-xs text-amber-800 leading-relaxed">
      <strong>⚠️ Important :</strong> Cette liste affiche les profils enregistrés <strong>dans l'application</strong>. Si un compte existe dans Firebase Console → Authentication mais n'est pas ici, il faut l'<strong>ajouter manuellement</strong> via "＋ Ajouter un utilisateur" (en mettant le même email). Le bouton 🔄 Rafraîchir recharge uniquement les profils déjà enregistrés dans l'app.
    </div>
    {fbUsers.length>0&&<div className="bg-white rounded-xl border shadow-sm overflow-hidden">
      <table className="w-full text-sm"><thead><tr className="bg-gray-50 border-b">
        <th className="text-left px-4 py-3 font-semibold text-gray-600">Nom</th>
        <th className="text-left px-4 py-3 font-semibold text-gray-600">Email Firebase</th>
        <th className="text-left px-4 py-3 font-semibold text-gray-600">Rôle</th>
        <th className="text-right px-4 py-3"></th>
      </tr></thead><tbody className="divide-y divide-gray-100">
        {fbUsers.map(u=><tr key={u.id}>
          <td className="px-4 py-2 font-medium">{u.name}</td>
          <td className="px-4 py-2 text-gray-500 text-xs font-mono">{u.email}</td>
          <td className="px-4 py-2">
            <select value={u.role} onChange={e=>changeRole(u.id,e.target.value)}
              className="text-xs border rounded px-2 py-1 bg-white focus:ring-1 focus:ring-emerald-500 outline-none">
              <option value="admin">Direction / Admin</option>
              <option value="secretariat">Secrétariat</option>
              <option value="enseignant">Enseignant</option>
              <option value="benevole">Bénévole</option>
            </select>
          </td>
          <td className="px-4 py-2 text-right">
            <Btn size="sm" variant="ghost" onClick={()=>sendInvite(u.email)}>📧 Lien connexion</Btn>
          </td>
        </tr>)}
      </tbody></table></div>}
    {fbUsers.length===0&&<div className="p-8 text-center text-gray-400 text-sm border rounded-xl border-dashed">
      Aucun utilisateur Firebase encore enregistré.</div>}
    {msg&&<div className={`p-3 rounded-lg text-sm font-medium ${msg.startsWith("✅")?"bg-green-50 text-green-800":"bg-red-50 text-red-800"}`}>{msg}</div>}
    <Modal open={showAdd} onClose={()=>{setShowAdd(false);setMsg("")}} title="Enregistrer un utilisateur">
      <div className="space-y-3">
        <div className="p-3 bg-blue-50 border border-blue-200 rounded text-xs text-blue-800 leading-relaxed">
          <strong>Workflow en 2 étapes :</strong><br/>
          1. Enregistrez le profil ici (nom, email, rôle)<br/>
          2. Créez le compte dans <a href="https://console.firebase.google.com" target="_blank" className="underline font-medium">Firebase Console → Authentication → Utilisateurs</a><br/>
          3. Cliquez <strong>Envoyer lien connexion</strong> — l'utilisateur reçoit un email pour définir son mot de passe
        </div>
        <Inp label="Nom complet *" value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))} placeholder="Ex: Fatima Benali"/>
        <Inp label="Email * (identifiant de connexion)" type="email" value={form.email} onChange={e=>setForm(p=>({...p,email:e.target.value}))} placeholder="fatima@elfaouz.fr"/>
        <Sel label="Rôle" value={form.role} onChange={e=>setForm(p=>({...p,role:e.target.value}))} options={roles}/>
        <div className="flex justify-end gap-2 pt-2">
          <Btn variant="secondary" onClick={()=>{setShowAdd(false);setMsg("")}}>Annuler</Btn>
          <Btn onClick={createUser} disabled={loading}>{loading?"Enregistrement…":"Enregistrer le profil"}</Btn>
        </div>
      </div>
    </Modal>
  </div>;
}

/*═══════════════════════════════════════════════════════════════
  RÉSOLUTION PROFIL — fonction globale accessible partout
═══════════════════════════════════════════════════════════════*/
async function resolveUserProfile(fbUser, remoteData){
  // Cherche le profil UNIQUEMENT dans remoteData.accounts passé en paramètre.
  // Aucun appel réseau ici — les données sont chargées une seule fois dans init().
  const email=(fbUser.email||"").trim().toLowerCase();

  const acc=(remoteData?.accounts||[]).find(a=>
    (a.email||"").trim().toLowerCase()===email ||
    (a.login||"").trim().toLowerCase()===email
  );

  if(acc){
    return{name:acc.name,role:acc.role,login:acc.login||fbUser.email,email:fbUser.email,uid:fbUser.uid};
  }

  // Aucun profil : créer un compte minimal dans Firestore pour que les autres appareils
  // voient cet utilisateur dans Paramètres > Comptes
  const name=fbUser.email.split("@")[0];
  const existing=remoteData?.accounts||[];
  // Check also by login field (teachers may have been pre-registered)
  const alreadyByLogin=existing.find(a=>(a.login||"").trim().toLowerCase()===email);
  if(alreadyByLogin){
    // Link the account: add the email if missing, keep role
    return{name:alreadyByLogin.name,role:alreadyByLogin.role,login:alreadyByLogin.login,email:fbUser.email,uid:fbUser.uid,teacherId:alreadyByLogin.teacherId||null};
  }
  const fallback={id:(Math.random().toString(36).slice(2,10)),login:fbUser.email,
    password:"(Firebase Auth)",name,role:"secretariat",email:fbUser.email};
  if(DB.isConfigured()){
    try{
      if(!existing.find(a=>(a.email||"").toLowerCase()===email)){
        await DB.save({...remoteData,accounts:[...existing,fallback]});
      }
    }catch(e){console.warn("fallback save:",e)}
  }
  return{name,role:"secretariat",login:fbUser.email,email:fbUser.email,uid:fbUser.uid};
}

/*═══════════════════════════════════════════════════════════════
  LOGIN
═══════════════════════════════════════════════════════════════*/
function LoginPage({onLogin,accounts}){
  const [email,setEmail]=useState("");const [pw,setPw]=useState("");
  const [err,setErr]=useState("");const [show,setShow]=useState(false);
  const [loading,setLoading]=useState(false);const [resetMode,setResetMode]=useState(false);
  const [resetMsg,setResetMsg]=useState("");
  const [useFirebase,setUseFirebase]=useState(AUTH.isConfigured());
  useEffect(()=>{
    const check=()=>{ensureFirebaseInit();setUseFirebase(AUTH.isConfigured());};
    check();
    const t=setTimeout(check,1000);
    return()=>clearTimeout(t);
  },[]);
  const firebaseReady_label=useFirebase;

  async function go(e){
    e.preventDefault();setErr("");setLoading(true);
    const emailVal=email.trim();
    try{
      // Vérifier Firebase au moment du clic (pas au render)
      ensureFirebaseInit();
      const firebaseReady=AUTH.isConfigured();
      if(firebaseReady){
        // Si l'identifiant ne contient pas "@", c'est forcément un compte local
        if(!emailVal.includes("@")){
          const local=accounts.find(a=>(a.login||"").toLowerCase()===emailVal.toLowerCase()&&a.password===pw);
          if(local){onLogin({name:local.name,role:local.role,login:local.login,email:local.email||"",teacherId:local.teacherId||null});return;}
          setErr("Identifiant ou mot de passe incorrect");setLoading(false);return;
        }
        // 1. Essayer Firebase Auth
        const res=await AUTH.signIn(emailVal,pw);
        if(res.ok){
          const fbUser=firebase.auth().currentUser;
          if(fbUser){
            let remoteData=null;
            try{await fbUser.getIdToken(true);remoteData=await DB.load();}catch(e){}
            const profile=await resolveUserProfile(fbUser,remoteData);
            onLogin(profile);
            setLoading(false);
            return;
          }
        }
        // Firebase Auth échoué — essayer compte local comme fallback
        const local=accounts.find(a=>
          (a.login||"").toLowerCase()===emailVal.toLowerCase() && a.password===pw
        );
        if(local){
          // Connexion locale OK. Si cet utilisateur a un email Firebase, 
          // le connecter aussi à Firebase Auth en arrière-plan pour permettre l'écriture Firestore
          if(local.email&&local.email.includes("@")){
            AUTH.signIn(local.email,pw).catch(()=>{});
          }
          onLogin({name:local.name,role:local.role,login:local.login,email:local.email||"",teacherId:local.teacherId||null});
          return;
        }
        // Aucun fallback — afficher erreur Firebase
        setErr(res.error||"Email ou mot de passe incorrect");
      } else {
        // Mode local uniquement (Firebase non configuré)
        const a=accounts.find(a=>a.login.toLowerCase()===emailVal.toLowerCase()&&a.password===pw);
        if(a)onLogin({name:a.name,role:a.role,login:a.login,teacherId:a.teacherId||null});
        else setErr("Identifiant ou mot de passe incorrect — Firebase non disponible");
      }
    }catch(err){
      console.error("Login error:",err);
      setErr("Erreur inattendue, réessayez.");
    }
    setLoading(false);
  }

  async function sendReset(e){
    e.preventDefault();setResetMsg("");
    const res=await AUTH.resetPassword(email.trim());
    setResetMsg(res.ok?"✅ Email envoyé ! Vérifiez votre boîte mail.":"❌ "+res.error);
  }

  return <div className="min-h-screen flex items-center justify-center" style={{background:"linear-gradient(135deg,#064e3b 0%,#0f172a 100%)"}}>
    <div className="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-sm">
      <div className="text-center mb-6">
        <div className="text-4xl mb-2">📚</div>
        <h2 className="text-xl font-bold text-gray-900" style={{fontFamily:"Georgia,serif"}}>Institut El Faouz</h2>
        <p className="text-xs text-gray-500 mt-1">{resetMode?"Réinitialisation du mot de passe":"Connexion"}</p>
      </div>
      {!resetMode?<form onSubmit={go} className="space-y-4">
        <Inp label={useFirebase?"Email ou identifiant":"Identifiant"} type="text" value={email}
          onChange={e=>setEmail(e.target.value)} placeholder={useFirebase?"email@exemple.fr ou admin":"Votre identifiant"} autoComplete="username"/>
        <div><label className="block text-xs font-medium text-gray-600 mb-1">Mot de passe</label>
          <div className="relative"><input type={show?"text":"password"} value={pw} onChange={e=>setPw(e.target.value)}
            placeholder="••••••••" className="w-full px-3 py-2 pr-10 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-emerald-500 outline-none" autoComplete="current-password"/>
            <button type="button" onClick={()=>setShow(!show)} className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm">{show?"🙈":"👁"}</button></div>
        </div>
        {err&&<div className="p-3 bg-red-50 rounded-xl border border-red-200 text-xs text-red-700 font-medium">⚠ {err}</div>}
        <button type="submit" disabled={!email||!pw||loading}
          className="w-full bg-emerald-700 text-white py-3 rounded-xl font-medium text-sm hover:bg-emerald-800 shadow-lg disabled:opacity-50 transition">
          {loading?"Connexion…":"Se connecter"}</button>
        {useFirebase&&<button type="button" onClick={()=>{setResetMode(true);setErr("")}}
          className="w-full text-xs text-gray-400 hover:text-emerald-700 text-center mt-1">
          Mot de passe oublié ?</button>}
      </form>:<form onSubmit={sendReset} className="space-y-4">
        <p className="text-xs text-gray-500">Entrez votre email pour recevoir un lien de réinitialisation.</p>
        <Inp label="Email" type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="votre@email.fr"/>
        {resetMsg&&<div className={`p-3 rounded-xl text-xs font-medium ${resetMsg.startsWith("✅")?"bg-green-50 border border-green-200 text-green-700":"bg-red-50 border border-red-200 text-red-700"}`}>{resetMsg}</div>}
        <button type="submit" disabled={!email||loading}
          className="w-full bg-emerald-700 text-white py-3 rounded-xl font-medium text-sm hover:bg-emerald-800 disabled:opacity-50 transition">
          Envoyer le lien</button>
        <button type="button" onClick={()=>{setResetMode(false);setResetMsg("")}}
          className="w-full text-xs text-gray-400 hover:text-gray-600 text-center">← Retour à la connexion</button>
      </form>}
      <p className="text-[10px] text-gray-400 text-center mt-4">Accès réservé au personnel autorisé</p>
    </div></div>;
}

    <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
      <div className="bg-white rounded-xl border border-gray-200 p-5 shadow-sm"><h3 className="text-sm font-bold mb-3">🚫 Complètes ({full.length})</h3>
        <div className="space-y-1 max-h-40 overflow-y-auto">{full.map(c=><div key={c.id} className="flex justify-between text-sm py-1 px-2 bg-red-50 rounded"><span>{c.label}</span><Badge color="red">{c.enrolled}/{c.quota}</Badge></div>)}</div></div>
      <div className="bg-white rounded-xl border border-gray-200 p-5 shadow-sm"><h3 className="text-sm font-bold mb-3">⚠️ Bientôt complètes ({near.length})</h3>
        <div className="space-y-1 max-h-40 overflow-y-auto">{near.map(c=><div key={c.id} className="flex justify-between text-sm py-1 px-2 bg-orange-50 rounded"><span>{c.label}</span><Badge color="orange">{c.quota-c.enrolled} pl.</Badge></div>)}</div></div>
    </div>
  </div>;
}

/*═══════════════════════════════════════════════════════════════
  INSCRIPTIONS — Panier multi-matières (points 1,2,3,5,6,20)
═══════════════════════════════════════════════════════════════*/
function InscriptionsPage({D,set}){
  const {students,enrollments,classes,redlist,invoices,teachers,user,tarifs}=D;
  const [search,setSearch]=useState("");const [showNew,setShowNew]=useState(false);const [showImport,setShowImport]=useState(false);const [detail,setDetail]=useState(null);const [editStudent,setEditStudent]=useState(null);const [filterS,setFilterS]=useState("all");const [selectedIds,setSelectedIds]=useState(new Set());const [bulkStatus,setBulkStatus]=useState("");
  const enriched=useMemo(()=>students.map(s=>{
    const enrs=enrollments.filter(e=>e.studentId===s.id);const cls=enrs.map(e=>classes.find(c=>c.id===e.classId)).filter(Boolean);
    const isRed=redlist.some(r=>r.nom&&r.prenom&&r.dob?r.nom.toLowerCase()===s.nom.toLowerCase()&&r.prenom.toLowerCase()===s.prenom?.toLowerCase()&&r.dob===s.dob:false);
    const isTeacher=teachers.some(t=>t.studentId===s.id);
    return {...s,enrollments:enrs,classes:cls,isRedlisted:isRed,isTeacher};
  }),[students,enrollments,classes,redlist,teachers]);
  const filtered=enriched.filter(s=>{
    if(search){const q=search.toLowerCase();if(!s.nom.toLowerCase().includes(q)&&!s.prenom.toLowerCase().includes(q))return false;}
    if(filterS==="redlist")return s.isRedlisted;
    if(filterS!=="all"&&!s.enrollments.some(e=>e.status===filterS))return false;return true;});

  function handleNewInscription(form){
    // CHECK RED LIST — block non-admin, warn admin
    const isRed=redlist.some(r=>r.nom&&r.prenom&&r.dob?r.nom.toLowerCase()===form.nom.toLowerCase()&&r.prenom.toLowerCase()===form.prenom.toLowerCase()&&r.dob===form.dob:false);
    if(isRed&&user.role!=="admin"){alert("INSCRIPTION BLOQUEE - Cet eleve est en LISTE ROUGE. Seul le directeur peut inscrire.");return}
    // CHECK QUOTAS — vérifier en temps réel avant d'inscrire
    const fullClasses=form.selectedClasses.map(cid=>classes.find(c=>c.id===cid)).filter(cl=>cl&&cl.enrolled>=cl.quota);
    if(fullClasses.length>0){
      alert("⛔ CLASSE(S) COMPLÈTE(S) — Impossible d'inscrire :\n"+fullClasses.map(c=>"• "+c.label+" ("+c.enrolled+"/"+c.quota+")").join("\n")+"\n\nLes données ont été mises à jour. Veuillez choisir une autre classe.");
      return;
    }
    // Create student
    const st={id:form.id,prenom:form.prenom,nom:form.nom,dob:form.dob,genre:form.genre,adresse:form.adresse,cp:form.cp,ville:form.ville,email:form.email,tel:form.tel,ine:form.ine,rep1:form.rep1,rep2:form.rep2||{},status:"Actif",createdAt:today()};
    set.setStudents(p=>[...p,st]);
    // Create enrollments for each selected class
    const newEnrs=form.selectedClasses.map(cid=>({id:uid(),studentId:form.id,classId:cid,status:"Préinscription",date:today()}));
    set.setEnrollments(p=>[...p,...newEnrs]);
    // If also teacher, create teacher record
    if(form.isAlsoTeacher){set.setTeachers(p=>[...p,{id:uid(),name:`${form.prenom} ${form.nom}`,subjectIds:form.teacherSubjects||[],phone:form.tel,email:form.email,studentId:form.id}]);}
    setShowNew(false);
  }

  function handleEditStudent(form){
    set.setStudents(p=>p.map(s=>s.id!==form.id?s:{...s,
      prenom:form.prenom,nom:form.nom,dob:form.dob,genre:form.genre,
      adresse:form.adresse,cp:form.cp,ville:form.ville,
      email:form.email,tel:form.tel,ine:form.ine,
      rep1:form.rep1,rep2:form.rep2||{}
    }));
    // Handle class changes: add new enrollments, remove cancelled ones
    const currentEnrs=enrollments.filter(e=>e.studentId===form.id);
    const currentClassIds=new Set(currentEnrs.map(e=>e.classId));
    const newClassIds=new Set(form.selectedClasses);
    // Add enrollments for newly added classes
    const toAdd=[...newClassIds].filter(cid=>!currentClassIds.has(cid));
    if(toAdd.length>0){
      const newEnrs=toAdd.map(cid=>({id:uid(),studentId:form.id,classId:cid,status:"Préinscription",date:today()}));
      set.setEnrollments(p=>[...p,...newEnrs]);
    }
    // Remove enrollments for removed classes (only if Préinscription or En attente, not accepted)
    const toRemove=currentEnrs.filter(e=>!newClassIds.has(e.classId)&&["Préinscription","En attente"].includes(e.status));
    if(toRemove.length>0){
      const removeIds=new Set(toRemove.map(e=>e.id));
      set.setEnrollments(p=>p.filter(e=>!removeIds.has(e.id)));
    }
    setEditStudent(null);
  }

  function changeStatus(eid,status){
    if(status==="Inscription acceptée"&&user.role==="benevole"){
      const enr=enrollments.find(e=>e.id===eid);if(enr){
        const st=students.find(s=>s.id===enr.studentId);
        if(st){const isRed=redlist.some(r=>r.nom&&r.prenom&&r.dob&&r.nom.toLowerCase()===st.nom.toLowerCase()&&r.prenom.toLowerCase()===st.prenom?.toLowerCase()&&r.dob===st.dob);
          if(isRed){alert("LISTE ROUGE - Vous ne pouvez pas valider cette inscription. Contactez le directeur ou le secretariat.");return}}}}
    // Vérifier le quota AVANT d'accepter — protection contre les inscriptions simultanées
    if(status==="Inscription acceptée"){
      const enr=enrollments.find(e=>e.id===eid);
      if(enr){
        const cl=classes.find(c=>c.id===enr.classId);
        if(cl&&cl.enrolled>=cl.quota){
          alert("⛔ CLASSE COMPLÈTE — "+cl.label+" ("+cl.enrolled+"/"+cl.quota+" élèves). Impossible d'inscrire un élève supplémentaire.");
          return;
        }
      }
    }
    set.setEnrollments(p=>p.map(e=>e.id!==eid?e:{...e,status}));
    if(status==="Inscription acceptée"){
      const enr=enrollments.find(e=>e.id===eid);if(!enr)return;
      set.setClasses(p=>p.map(c=>c.id===enr.classId?{...c,enrolled:c.enrolled+1}:c));
      // Auto-invoice if not already invoiced
      const cl=classes.find(c=>c.id===enr.classId);if(!cl)return;
      const t=tarifs[cl.matiere]||150;
      const existingInv=invoices.find(i=>i.studentId===enr.studentId&&i.enrollmentIds.includes(eid));
      if(!existingInv){
        const allEnrs=enrollments.filter(e=>e.studentId===enr.studentId&&e.status==="Inscription acceptée");
        const matieres=new Set(allEnrs.map(e=>{const c2=classes.find(c=>c.id===e.classId);return c2?.matiere}).filter(Boolean));
        matieres.add(cl.matiere);
        const fdDossier=tarifs["Frais de dossier"]!==undefined?tarifs["Frais de dossier"]:15;
        const items=[{label:cl.matiere,amount:t},{label:"Frais de dossier",amount:fdDossier}];
        // Auto-remises from state
        const autoR=(D.remises||[]).filter(r=>r.auto&&r.condition);
        autoR.forEach(r=>{
          if(r.condition==="arabe+si"&&matieres.has("Arabe")&&matieres.has("Sciences Islamiques"))items.push({label:r.label,amount:r.amount});
          else if(r.condition==="arabe+coran"&&matieres.has("Arabe")&&matieres.has("Coran"))items.push({label:r.label,amount:r.amount});
        });
        // Manual remises selected in form (not applicable in bulk context)
        // (form.selectedRemises||[]) — skipped: no form context here
        // Extras selected in form (not applicable in bulk context)
        // if(allEnrs.length===0)(form.selectedExtras||[]) — skipped: no form context here
        const total=items.reduce((s,i)=>s+i.amount,0);
        set.setInvoices(p=>[...p,{id:uid(),studentId:enr.studentId,enrollmentIds:[eid],items,total,paid:0,status:"Impayée",payments:[],schedule:[]}]);
      }
    }
    if(status==="Abandon"||status==="Exclusion"){
      const enr=enrollments.find(e=>e.id===eid);if(enr)set.setClasses(p=>p.map(c=>c.id===enr.classId?{...c,enrolled:Math.max(0,c.enrolled-1)}:c));
    }
  }

  function toggleSelect(sid){setSelectedIds(p=>{const n=new Set(p);n.has(sid)?n.delete(sid):n.add(sid);return n;});}
  function toggleAll(){setSelectedIds(p=>p.size===filtered.length?new Set():new Set(filtered.map(s=>s.id)));}
  function applyBulkStatus(){
    if(!bulkStatus||selectedIds.size===0)return;
    const ok=selectedIds.size<=5||confirm("Changer le statut de "+selectedIds.size+" élève(s) en \""+bulkStatus+"\" ?\nCette action s\'applique à toutes leurs inscriptions.");
    if(!ok)return;
    selectedIds.forEach(sid=>{
      const enrs=enrollments.filter(e=>e.studentId===sid);
      enrs.forEach(e=>changeStatus(e.id,bulkStatus));
    });
    setSelectedIds(new Set());setBulkStatus("");
  }

  return <div className="space-y-5">
    <div className="flex items-center justify-between">
      <div><h2 className="text-2xl font-bold text-gray-900">Inscriptions</h2><p className="text-sm text-gray-500">{students.length} élèves — {enrollments.filter(e=>e.status==="Inscription acceptée").length} acceptés</p></div>
      <div className="flex gap-2"><Btn variant="secondary" onClick={()=>setShowImport(true)}>📥 Import Excel</Btn><Btn onClick={()=>setShowNew(true)}>＋ Nouvelle inscription</Btn></div></div>
    <div className="flex gap-3 flex-wrap">
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Rechercher…" className="flex-1 min-w-[200px] px-3 py-2 border border-gray-300 rounded-lg text-sm outline-none"/>
      <Sel value={filterS} onChange={e=>{setFilterS(e.target.value);setSelectedIds(new Set());}} options={[{value:"all",label:"Tous"},{value:"Inscription acceptée",label:"Acceptée"},{value:"Préinscription",label:"Préinscription"},{value:"En attente",label:"En attente"},{value:"Abandon",label:"Abandon"},{value:"redlist",label:"⚠ Liste rouge"}]}/></div>
    {(user.role==="admin"||user.role==="secretariat"||user.role==="benevole")&&<div className={`flex items-center gap-3 px-4 py-2 rounded-xl border text-sm transition-all ${selectedIds.size>0?"bg-indigo-50 border-indigo-300":"bg-gray-50 border-gray-200"}`}>
      <label className="flex items-center gap-2 cursor-pointer select-none">
        <input type="checkbox" checked={filtered.length>0&&selectedIds.size===filtered.length} onChange={toggleAll} className="w-4 h-4 accent-indigo-600"/>
        <span className="text-gray-600 font-medium">{selectedIds.size===0?"Tout sélectionner":`${selectedIds.size} / ${filtered.length} sélectionné(s)`}</span>
      </label>
      {selectedIds.size>0&&<>
        <span className="text-gray-300">|</span>
        <span className="text-xs text-gray-500">Changer statut :</span>
        <Sel value={bulkStatus} onChange={e=>setBulkStatus(e.target.value)} options={[{value:"",label:"— choisir —"},{value:"Inscription acceptée",label:"✓ Inscription acceptée"},{value:"Préinscription",label:"Préinscription"},{value:"En attente",label:"En attente"},{value:"Refusé / Pas de place",label:"Refusé / Pas de place"},{value:"Abandon",label:"Abandon"},{value:"Exclusion",label:"Exclusion"}]}/>
        <Btn onClick={applyBulkStatus} disabled={!bulkStatus} size="sm" variant={bulkStatus==="Inscription acceptée"?"primary":bulkStatus==="Abandon"||bulkStatus==="Exclusion"||bulkStatus==="Refusé / Pas de place"?"danger":"secondary"}>Appliquer</Btn>
        <button onClick={()=>{setSelectedIds(new Set());setBulkStatus("");}} className="text-xs text-gray-400 hover:text-gray-600 ml-1">✕ Annuler</button>
      </>}
    </div>}
    <div className="bg-white rounded-xl border border-gray-200 shadow-sm overflow-x-auto">
      <table className="w-full text-sm"><thead><tr className="bg-gray-50 border-b">
        <th className="px-3 py-3 w-8"></th>
        <th className="text-left px-4 py-3 font-semibold text-gray-600">Élève</th>
        <th className="text-left px-4 py-3 font-semibold text-gray-600">Ville</th>
        <th className="text-left px-4 py-3 font-semibold text-gray-600">Classe(s)</th>
        <th className="text-left px-4 py-3 font-semibold text-gray-600">Statut</th>
        <th className="text-left px-4 py-3 font-semibold text-gray-600">Type</th>
        <th className="text-right px-4 py-3">Actions</th>
      </tr></thead><tbody className="divide-y divide-gray-100">
        {filtered.slice(0,100).map(s=>{const isSel=selectedIds.has(s.id);return <tr key={s.id} className={`hover:bg-gray-50/50 ${isSel?"bg-indigo-50/60":""} ${s.isRedlisted?"bg-red-50/40":""}`}>
          <td className="px-3 py-2 text-center"><input type="checkbox" checked={isSel} onChange={()=>toggleSelect(s.id)} className="w-4 h-4 accent-indigo-600 cursor-pointer"/></td>
          <td className="px-4 py-2"><p className="font-medium text-gray-900">{s.isRedlisted&&"⚠️ "}{s.prenom} {s.nom}</p><p className="text-xs text-gray-400">{s.email}</p></td>
          <td className="px-4 py-2 text-gray-600 text-xs">{s.ville}</td>
          <td className="px-4 py-2"><div className="flex flex-wrap gap-1">{s.classes.map(c=><Badge key={c.id} color="blue">{c.label}</Badge>)}</div></td>
          <td className="px-4 py-2"><div className="flex flex-wrap gap-1">{s.enrollments.map(e=><SB key={e.id} status={e.status}/>)}</div></td>
          <td className="px-4 py-2">{s.isTeacher&&<Badge color="purple">👨‍🏫 Prof</Badge>} <Badge color={s.ine==="Passage"?"green":s.ine==="Redoublement"?"orange":"gray"}>{s.ine||"Nouveau"}</Badge></td>
          <td className="px-4 py-2 text-right"><div className="flex items-center justify-end gap-1">
            <button onClick={()=>setDetail(s)} className="p-1 hover:bg-gray-100 rounded text-gray-400 text-xs" title="Visualiser">👁</button>
            {(user.role==="admin"||user.role==="secretariat")&&<button onClick={()=>setEditStudent(s)} className="p-1 hover:bg-blue-100 rounded text-blue-500 text-xs" title="Modifier">✏️</button>}
            {(user.role==="admin"||user.role==="secretariat"||user.role==="benevole")&&s.enrollments.filter(e=>["Préinscription","En attente"].includes(e.status)).map(e=><span key={e.id} className="flex gap-0.5">
              <button onClick={()=>changeStatus(e.id,"Inscription acceptée")} className="p-1 hover:bg-green-100 rounded text-green-600 text-xs font-bold">✓</button>
              <button onClick={()=>changeStatus(e.id,"Refusé / Pas de place")} className="p-1 hover:bg-red-100 rounded text-red-500 text-xs font-bold">✕</button></span>)}
            {(user.role==="admin"||user.role==="secretariat")&&s.enrollments.filter(e=>e.status==="Inscription acceptée").length>0&&<>
              <button onClick={()=>{s.enrollments.filter(e=>e.status==="Inscription acceptée").forEach(e=>changeStatus(e.id,"Abandon"))}} className="p-1 hover:bg-gray-100 rounded text-xs" title="Abandon">🏃</button>
              <button onClick={()=>{s.enrollments.filter(e=>e.status==="Inscription acceptée").forEach(e=>changeStatus(e.id,"Exclusion"))}} className="p-1 hover:bg-red-100 rounded text-xs" title="Exclusion">🚫</button></>}
          </div></td>
        </tr>;})}
      </tbody></table></div>

    <Modal open={showNew} onClose={()=>setShowNew(false)} title="Nouvelle inscription — Panier multi-matières" wide>
      <NewInscriptionForm classes={classes} subjects={D.subjects} tarifs={tarifs} remises={D.remises} redlist={redlist} user={user} onSubmit={handleNewInscription} onCancel={()=>setShowNew(false)}/>
    </Modal>
    <Modal open={!!detail} onClose={()=>setDetail(null)} title={detail?`${detail.prenom} ${detail.nom}`:""} wide>
      {detail&&<div className="space-y-3 text-sm">
        <div className="grid grid-cols-2 gap-3"><div><strong>Genre:</strong> {detail.genre==="M"?"M":"F"}</div><div><strong>Né(e):</strong> {detail.dob}</div>
          <div><strong>Adresse:</strong> {detail.adresse}, {detail.cp} {detail.ville}</div><div><strong>Contact:</strong> {detail.email} / {detail.tel}</div></div>
        {detail.rep1?.nom&&<p><strong>Rep.1:</strong> {detail.rep1.type} — {detail.rep1.prenom} {detail.rep1.nom}</p>}
        {detail.rep2?.nom&&<p><strong>Rep.2:</strong> {detail.rep2.type} — {detail.rep2.prenom} {detail.rep2.nom}</p>}
        <div className="pt-2 border-t"><strong>Inscriptions:</strong>{detail.enrollments.map(e=>{const cl=detail.classes.find(c=>c.id===e.classId);
          return <div key={e.id} className="flex justify-between py-1"><span>{cl?.label||"—"}</span><SB status={e.status}/></div>})}</div>
        {detail.isTeacher&&<div className="pt-2 border-t"><Badge color="purple">Cet élève est aussi enseignant</Badge></div>}
      </div>}
    </Modal>
    <Modal open={showImport} onClose={()=>setShowImport(false)} title="Import en masse depuis Excel" wide>
      <ImportStudents D={D} set={set} onDone={()=>setShowImport(false)}/>
    </Modal>
    <Modal open={!!editStudent} onClose={()=>setEditStudent(null)} title={editStudent?`Modifier — ${editStudent.prenom} ${editStudent.nom}`:""} wide>
      {editStudent&&<EditStudentModal student={editStudent} classes={classes} enrollments={enrollments} onSave={handleEditStudent} onCancel={()=>setEditStudent(null)}/>}
    </Modal>
  </div>;
}

function EditStudentModal({student,classes,enrollments,onSave,onCancel}){
  const currentEnrs=enrollments.filter(e=>e.studentId===student.id);
  const currentClassIds=currentEnrs.map(e=>e.classId);
  const [f,sF]=useState({
    prenom:student.prenom||"",nom:student.nom||"",dob:student.dob||"",genre:student.genre||"M",
    email:student.email||"",tel:student.tel||"",adresse:student.adresse||"",cp:student.cp||"",ville:student.ville||"",
    ine:student.ine||"",
    rep1:{type:student.rep1?.type||"Tuteur",nom:student.rep1?.nom||"",prenom:student.rep1?.prenom||"",tel:student.rep1?.tel||"",email:student.rep1?.email||""},
    rep2:{type:student.rep2?.type||"Tuteur",nom:student.rep2?.nom||"",prenom:student.rep2?.prenom||"",tel:student.rep2?.tel||"",email:student.rep2?.email||""},
    selectedClasses:[...currentClassIds]
  });
  const u=(k,v)=>sF(p=>({...p,[k]:v}));
  const uRep=(rep,k,v)=>sF(p=>({...p,[rep]:{...p[rep],[k]:v}}));
  const toggleClass=(cid)=>sF(p=>{
    const enr=currentEnrs.find(e=>e.classId===cid);
    const isAccepted=enr&&enr.status==="Inscription acceptée";
    if(isAccepted)return p; // can't remove an accepted class from here
    const sel=p.selectedClasses.includes(cid)?p.selectedClasses.filter(x=>x!==cid):[...p.selectedClasses,cid];
    return {...p,selectedClasses:sel};
  });
  const grouped={};classes.forEach(c=>{if(!grouped[c.matiere])grouped[c.matiere]=[];grouped[c.matiere].push(c)});
  return <div className="space-y-4">
    <p className="text-xs text-gray-500 font-medium uppercase tracking-wide border-b pb-1">Informations élève</p>
    <div className="grid grid-cols-3 gap-3">
      <Inp label="Prénom *" value={f.prenom} onChange={e=>u("prenom",e.target.value)}/>
      <Inp label="Nom *" value={f.nom} onChange={e=>u("nom",e.target.value)}/>
      <Inp label="Date de naissance" type="date" value={f.dob} onChange={e=>u("dob",e.target.value)}/>
    </div>
    <div className="grid grid-cols-3 gap-3">
      <Sel label="Genre" value={f.genre} onChange={e=>u("genre",e.target.value)} options={[{value:"M",label:"Masculin"},{value:"F",label:"Féminin"}]}/>
      <Inp label="Email" type="email" value={f.email} onChange={e=>u("email",e.target.value)}/>
      <Inp label="Téléphone" value={f.tel} onChange={e=>u("tel",e.target.value)}/>
    </div>
    <div className="grid grid-cols-3 gap-3">
      <Inp label="Adresse" value={f.adresse} onChange={e=>u("adresse",e.target.value)}/>
      <Inp label="Code postal" value={f.cp} onChange={e=>u("cp",e.target.value)}/>
      <Inp label="Ville" value={f.ville} onChange={e=>u("ville",e.target.value)}/>
    </div>
    <div className="grid grid-cols-3 gap-3">
      <Sel label="Statut élève" value={f.ine} onChange={e=>u("ine",e.target.value)} options={[{value:"",label:"Nouveau"},{value:"Passage",label:"Passage"},{value:"Redoublement",label:"Redoublement"}]}/>
    </div>
    <p className="text-xs text-gray-500 font-medium uppercase tracking-wide border-b pb-1 pt-2">Représentant légal 1</p>
    <div className="grid grid-cols-4 gap-3">
      <Sel label="Type" value={f.rep1.type} onChange={e=>uRep("rep1","type",e.target.value)} options={[{value:"Tuteur",label:"Tuteur"},{value:"Mère",label:"Mère"},{value:"Père",label:"Père"}]}/>
      <Inp label="Nom" value={f.rep1.nom} onChange={e=>uRep("rep1","nom",e.target.value)}/>
      <Inp label="Prénom" value={f.rep1.prenom} onChange={e=>uRep("rep1","prenom",e.target.value)}/>
      <Inp label="Téléphone" value={f.rep1.tel} onChange={e=>uRep("rep1","tel",e.target.value)}/>
    </div>
    <p className="text-xs text-gray-500 font-medium uppercase tracking-wide border-b pb-1 pt-2">Représentant légal 2 (optionnel)</p>
    <div className="grid grid-cols-4 gap-3">
      <Sel label="Type" value={f.rep2.type} onChange={e=>uRep("rep2","type",e.target.value)} options={[{value:"Tuteur",label:"Tuteur"},{value:"Mère",label:"Mère"},{value:"Père",label:"Père"}]}/>
      <Inp label="Nom" value={f.rep2.nom} onChange={e=>uRep("rep2","nom",e.target.value)}/>
      <Inp label="Prénom" value={f.rep2.prenom} onChange={e=>uRep("rep2","prenom",e.target.value)}/>
      <Inp label="Téléphone" value={f.rep2.tel} onChange={e=>uRep("rep2","tel",e.target.value)}/>
    </div>
    <div className="pt-2">

function ImportStudents({D,set,onDone}){
  const [text,setText]=useState("");const [preview,setPreview]=useState([]);const [imported,setImported]=useState(0);const [warnings,setWarnings]=useState([]);
  const [editingIdx,setEditingIdx]=useState(null);
  const {classes}=D;

  // Normalize class name variants from the external system
  function normalizeClass(name){
    if(!name)return "";
    const n=name.trim();
    const map={"1Er Coran Ados B":"1er Coran Ados B","1Er Coran Ados C":"1er Coran Ados C","1Er Coran Ados D":"1er Coran Ados D","1er Coran Ado D":"1er Coran Ados D","1Er Coran Ados E":"1er Coran Ados E","2eS Arabe Enfant B":"2eS Arabe Enfant B"};
    return map[n]||n;
  }

  // Detect if the pasted data is the raw Excel export (has the "État" column)
  // Raw Excel columns (tab-separated, starting from col 0):
  // 0:#  1:ID  2:INE  3:Prenom  4:Nom  5:DateNaiss  6:Genre  7:Adresse  8:CP  9:Ville
  // 10:Classe  11:Niveau  12:Groupe  13:InscrLe  14:VilleNaiss  15:DepNaiss  16:Nationalité
  // 17:SortieLe  18:Email  19:Tel  20:Regime  21:État  22:Étiquette  23:Enseignants
  // 24:Rep1_Type  25:Rep1_Civ  26:Rep1_Nom  27:Rep1_Prenom  ...
  function isRawExcelFormat(cols){
    // Raw export has at least 22 cols and col 21 is État (Inscription acceptée / Refusé / etc.)
    if(cols.length<22)return false;
    const etat=cols[21]?.trim();
    return["Inscription acceptée","Refusé / Pas de place","Corbeille","Annulé / désistement","Préinscription acceptée"].includes(etat)||cols[10]?.trim()==="AFFECTER UNE ETIQUETTE"||cols[2]?.trim()==="Passage"||cols[2]?.trim()==="Redoublement";
  }

  function parse(){
    const rawLines=text.trim().split("\n");
    // Skip header row if it contains "Prenom" or "#" in first column
    const lines=rawLines.filter(l=>{const c=l.split("\t");return l.trim()&&c[0]?.trim()!=="Prenom"&&c[0]?.trim()!=="#"&&c[3]?.trim()!=="Prenom"});
    if(lines.length===0){setPreview([]);return;}

    const firstCols=lines[0].split("\t");
    const rawExcel=isRawExcelFormat(firstCols);

    if(rawExcel){
      // --- RAW EXCEL FORMAT ---
      // Group rows by student ID (col 1) to handle double-cursus
      // Rules:
      //   • Only import rows with État == "Inscription acceptée"
      //   • Étiquette (col 22) = target class in this app
      //   • Classe (col 10) = source class / previous class
      //   • If Classe == Étiquette → single class (only Étiquette)
      //   • If Classe != Étiquette → double cursus → two enrollments
      const studentMap=new Map(); // key = ID+Nom+Prenom+DOB, value = {data, classes:[]}
      const warns=[];

      lines.forEach(line=>{
        const c=line.split("\t");
        const etat=(c[21]||"").trim();
        if(etat!=="Inscription acceptée")return;

        const prenom=(c[3]||"").trim();
        const nom=(c[4]||"").trim();
        if(!prenom||!nom)return;

        const id=(c[1]||"").trim();
        const key=id||(prenom+"|"+nom+"|"+(c[5]||"").trim());

        const classeRaw=normalizeClass((c[10]||"").trim());
        const etiquetteRaw=normalizeClass((c[22]||"").trim());

        const isInvalid=(v)=>!v||v==="AFFECTER UNE ETIQUETTE"||v==="None";

        // Determine which class(es) to enroll in
        let classesToAdd=[];
        if(!isInvalid(etiquetteRaw))classesToAdd.push(etiquetteRaw);
        if(!isInvalid(classeRaw)&&classeRaw!==etiquetteRaw)classesToAdd.push(classeRaw);
        classesToAdd=[...new Set(classesToAdd)];

        if(classesToAdd.length===0)return;

        // Check all classes exist
        classesToAdd.forEach(cls=>{
          const found=classes.find(c2=>c2.label.toLowerCase()===cls.toLowerCase()||c2.code.toLowerCase()===cls.toLowerCase());
          if(!found)warns.push(`Classe introuvable : "${cls}" (élève ${prenom} ${nom})`);
        });

        const dob=(c[5]||"").trim().slice(0,10);
        const genre=(c[6]||"").trim()==="F"?"F":"M";
        const adresse=(c[7]||"").trim();
        const cp=(c[8]||"").trim();
        const ville=(c[9]||"").trim();
        const email=(c[18]||"").trim();
        const tel=(c[19]||"").trim();
        const rep1Type=(c[24]||"Tuteur").trim()||"Tuteur";
        const rep1Nom=(c[26]||"").trim();
        const rep1Prenom=(c[27]||"").trim();

        if(!studentMap.has(key)){
          studentMap.set(key,{prenom,nom,dob,genre,email,tel,adresse,cp,ville,rep1Nom,rep1Prenom,rep1Type,classes:[]});
        }
        const entry=studentMap.get(key);
        classesToAdd.forEach(cls=>{if(!entry.classes.includes(cls))entry.classes.push(cls);});
        // Update contact info if more complete
        if(email&&!entry.email)entry.email=email;
        if(tel&&!entry.tel)entry.tel=tel;
      });

      const uniqueWarns=[...new Set(warns)];
      setWarnings(uniqueWarns);
      // Expand: one preview row per student (with potentially multiple classes)
      const parsed=[...studentMap.values()];
      setPreview(parsed);

    }else{
      // --- SIMPLE FORMAT (original) ---
      // Prenom | Nom | DateNaiss | Genre | Email | Tel | Adresse | CP | Ville | Classe | NomRep1 | PrenomRep1 | TypeRep1
      const warns=[];
      const parsed=lines.map(l=>{const cols=l.split("\t");
        const cls=(cols[9]||"").trim();
        if(cls){
          const found=classes.find(c=>c.label.toLowerCase().includes(cls.toLowerCase())||c.code.toLowerCase()===cls.toLowerCase());
          if(!found)warns.push(`Classe introuvable : "${cls}"`);
        }
        return{prenom:cols[0]?.trim()||"",nom:cols[1]?.trim()||"",dob:cols[2]?.trim()||"",genre:cols[3]?.trim()||"M",email:cols[4]?.trim()||"",tel:cols[5]?.trim()||"",
          adresse:cols[6]?.trim()||"",cp:cols[7]?.trim()||"",ville:cols[8]?.trim()||"",classes:[cls].filter(Boolean),
          rep1Nom:cols[10]?.trim()||"",rep1Prenom:cols[11]?.trim()||"",rep1Type:cols[12]?.trim()||"Tuteur"}});
      setWarnings([...new Set(warns)]);
      setPreview(parsed.filter(r=>r.prenom&&r.nom));
    }
  }

  function doImport(){let count=0;
    preview.forEach(r=>{if(!r.prenom||!r.nom)return;
      const sid=uid();
      set.setStudents(p=>[...p,{id:sid,prenom:r.prenom,nom:r.nom,dob:r.dob,genre:r.genre,email:r.email,tel:r.tel,adresse:r.adresse,cp:r.cp,ville:r.ville,ine:"",rep1:{type:r.rep1Type||"Tuteur",nom:r.rep1Nom||"",prenom:r.rep1Prenom||""},rep2:{},status:"Actif",createdAt:today()}]);
      (r.classes||[]).forEach(cls=>{
        if(!cls)return;
        const cl=classes.find(c=>c.label.toLowerCase()===cls.toLowerCase()||c.code.toLowerCase()===cls.toLowerCase()||c.label.toLowerCase().includes(cls.toLowerCase()));
        if(cl){set.setEnrollments(p=>[...p,{id:uid(),studentId:sid,classId:cl.id,status:"Préinscription",date:today()}])}
      });
      count++;});
    setImported(count);alert(`${count} élève(s) importé(s) !`)}

  const totalClasses=preview.reduce((s,r)=>s+(r.classes||[]).length,0);

  return <div className="space-y-4">
    <div className="p-3 bg-blue-50 rounded-lg border border-blue-200 text-xs text-blue-800">
      <p className="font-bold mb-1">📋 Deux formats acceptés :</p>
      <p className="font-semibold mt-1">① Export brut (depuis votre logiciel de gestion) :</p>
      <p className="font-mono ml-2"># | ID | INE | Prénom | Nom | DateNaiss | Genre | Adresse | CP | Ville | Classe | … | État | Étiquette | …</p>
      <p className="ml-2 text-blue-700">Seuls les élèves "Inscription acceptée" sont importés. Si Classe ≠ Étiquette → double cursus automatique.</p>
      <p className="font-semibold mt-2">② Format simplifié (colonnes TAB) :</p>
      <p className="font-mono ml-2">Prénom | Nom | DateNaiss | Genre | Email | Tel | Adresse | CP | Ville | Classe | NomRep1 | PrénomRep1 | TypeRep1</p>
    </div>
    <textarea value={text} onChange={e=>setText(e.target.value)} rows={8} className="w-full px-3 py-2 border rounded-lg text-xs font-mono" placeholder="Collez ici le contenu copié depuis Excel (avec ou sans en-têtes)…"/>
    <div className="flex gap-2">
      <Btn variant="secondary" onClick={parse}>Prévisualiser ({text.split("\n").filter(l=>l.trim()).length} lignes)</Btn>
      <Btn onClick={doImport} disabled={preview.length===0}>Importer {preview.length} élève(s){totalClasses>preview.length?` → ${totalClasses} inscriptions`:""}</Btn>
    </div>
    {warnings.length>0&&<div className="p-3 bg-orange-50 rounded-lg border border-orange-200 text-xs text-orange-800">
      <p className="font-bold mb-1">⚠ Avertissements ({warnings.length}) :</p>
      {warnings.slice(0,10).map((w,i)=><p key={i}>• {w}</p>)}
      {warnings.length>10&&<p>… et {warnings.length-10} de plus.</p>}
    </div>}
    {preview.length>0&&<div className="bg-white rounded-lg border max-h-72 overflow-y-auto">
      <table className="w-full text-xs"><thead><tr className="bg-gray-50 border-b sticky top-0">
        <th className="px-2 py-1 text-left">Prénom</th><th className="px-2 py-1 text-left">Nom</th><th className="px-2 py-1">Naiss.</th>
        <th className="px-2 py-1">G</th><th className="px-2 py-1 text-left">Tél / Email</th><th className="px-2 py-1 text-left">Adresse</th><th className="px-2 py-1 text-left">Classe(s)</th>
        <th className="px-2 py-1 text-center">Modif.</th>
      </tr></thead><tbody>{preview.map((r,i)=><tr key={i} className="border-b border-gray-100 hover:bg-gray-50/50">
        <td className="px-2 py-1">{r.prenom}</td><td className="px-2 py-1 font-medium">{r.nom}</td>
        <td className="px-2 py-1 text-center text-gray-500">{r.dob}</td><td className="px-2 py-1 text-center">{r.genre}</td>
        <td className="px-2 py-1 text-gray-500 truncate max-w-[80px]"><span className="block">{r.tel||"—"}</span><span className="block text-gray-400 text-[10px]">{r.email}</span></td>
        <td className="px-2 py-1 text-gray-500 truncate max-w-[90px]">{r.adresse?`${r.adresse}${r.cp?" "+r.cp:""}${r.ville?" "+r.ville:""}`:r.ville||"—"}</td>
        <td className="px-2 py-1">{(r.classes||[]).map((cls,j)=>{const found=classes.find(c=>c.label.toLowerCase()===cls.toLowerCase()||c.code.toLowerCase()===cls.toLowerCase()||c.label.toLowerCase().includes(cls.toLowerCase()));return <Badge key={j} color={found?"green":"red"}>{cls}</Badge>})}</td>
        <td className="px-2 py-1 text-center"><button onClick={()=>setEditingIdx(i)} className="p-1 hover:bg-emerald-100 rounded text-emerald-700 text-sm" title="Modifier">✏️</button></td>
      </tr>)}</tbody></table></div>}
    {imported>0&&<div className="p-3 bg-green-50 rounded-lg border border-green-200 text-sm text-green-800 font-medium">✓ {imported} élève(s) importé(s) avec succès. Fermez pour revenir à la liste.</div>}
    <Modal open={editingIdx!==null} onClose={()=>setEditingIdx(null)} title={editingIdx!==null?`Modifier — ${preview[editingIdx]?.prenom} ${preview[editingIdx]?.nom}`:""} wide>
      {editingIdx!==null&&<EditImportRowModal
        row={preview[editingIdx]}
        classes={classes}
        onSave={updated=>{setPreview(p=>p.map((r,i)=>i===editingIdx?updated:r));setEditingIdx(null);}}
        onCancel={()=>setEditingIdx(null)}
      />}
    </Modal>
  </div>;
}

function NewInscriptionForm({classes,subjects,tarifs,remises,redlist,user,onSubmit,onCancel}){

    else if(r.condition==="arabe+coran"&&selectedMatieres.has("Arabe")&&selectedMatieres.has("Coran"))estTotal+=r.amount;
  });

    <Sel label="Statut scolaire" value={f.ine} onChange={e=>u("ine",e.target.value)} options={[{value:"",label:"Nouvelle inscription"},{value:"Passage",label:"Passage"},{value:"Redoublement",label:"Redoublement"}]}/>
    <p className="text-xs text-gray-500 font-medium uppercase pt-2">Représentants légaux</p>
    <div className="grid grid-cols-3 gap-3"><Sel label="Type Rep.1" value={f.rep1.type} onChange={e=>sF(p=>({...p,rep1:{...p.rep1,type:e.target.value}}))} options={[{value:"Tuteur",label:"Tuteur"},{value:"Mère",label:"Mère"},{value:"Père",label:"Père"}]}/><Inp label="Nom" value={f.rep1.nom} onChange={e=>sF(p=>({...p,rep1:{...p.rep1,nom:e.target.value}}))}/><Inp label="Prénom" value={f.rep1.prenom} onChange={e=>sF(p=>({...p,rep1:{...p.rep1,prenom:e.target.value}}))}/></div>

    <p className="text-xs text-gray-500 font-medium uppercase pt-2">🛒 Panier — Classes</p>
    <div className="space-y-3 max-h-52 overflow-y-auto border border-gray-200 rounded-lg p-3">
      {Object.entries(grouped).map(([matiere,cls])=><div key={matiere}>
        <p className="text-xs font-bold text-gray-700 mb-1">{matiere}{tarifs[matiere]!==undefined?" — "+tarifs[matiere]+"€":""}</p>
        <div className="grid grid-cols-2 gap-1">{cls.map(c=>{const sel=f.selectedClasses.includes(c.id);
          return <button key={c.id} type="button" onClick={()=>toggleClass(c.id)} className={`text-left p-2 rounded-lg border text-xs transition ${sel?"border-emerald-500 bg-emerald-50":"border-gray-200 hover:border-gray-300"}`}>
            <span className="font-medium">{c.label}</span><br/><span className="text-gray-400">{c.quota-c.enrolled} places</span>
            {sel&&<span className="float-right text-emerald-600 font-bold">✓</span>}</button>})}</div></div>)}
    </div>

    {extras.length>0&&<div>
      <p className="text-xs text-gray-500 font-medium uppercase mb-2">🧾 Frais supplémentaires</p>
      <div className="grid grid-cols-2 gap-1 border border-gray-200 rounded-lg p-3">
        {extras.map(([key,val])=>{const sel=f.selectedExtras.includes(key);return <button key={key} type="button" onClick={()=>toggleExtra(key)}
          className={`text-left p-2 rounded-lg border text-xs transition ${sel?"border-amber-500 bg-amber-50":"border-gray-200 hover:border-gray-300"}`}>
          <span className="font-medium">{key}</span><span className="ml-1 text-gray-500">{val}€</span>
          {sel&&<span className="float-right text-amber-600 font-bold">✓</span>}</button>;})}
      </div></div>}

    {manualRemises.length>0&&<div>
      <p className="text-xs text-gray-500 font-medium uppercase mb-2">🏷️ Remises manuelles</p>
      <div className="grid grid-cols-2 gap-1 border border-gray-200 rounded-lg p-3">
        {manualRemises.map(r=>{const sel=f.selectedRemises.includes(r.id);return <button key={r.id} type="button" onClick={()=>toggleRemise(r.id)}
          className={`text-left p-2 rounded-lg border text-xs transition ${sel?"border-purple-500 bg-purple-50":"border-gray-200 hover:border-gray-300"}`}>
          <span className="font-medium">{r.label}</span><span className="ml-1 text-red-600">{r.amount}€</span>
          {sel&&<span className="float-right text-purple-600 font-bold">✓</span>}</button>;})}
      </div></div>}

    {f.selectedClasses.length>0&&<div className="p-3 bg-emerald-50 rounded-lg border border-emerald-200 space-y-1">
      <p className="text-xs text-gray-600 font-semibold uppercase mb-1">Récapitulatif</p>
      {tarifs["Frais de dossier"]!==undefined&&<div className="flex justify-between text-xs"><span className="text-gray-600">Frais de dossier</span><span>{tarifs["Frais de dossier"]}€</span></div>}
      {[...selectedMatieres].map(m=>tarifs[m]!==undefined&&<div key={m} className="flex justify-between text-xs"><span className="text-gray-600">{m}</span><span>{tarifs[m]}€</span></div>)}
      {f.selectedExtras.map(key=><div key={key} className="flex justify-between text-xs"><span className="text-gray-600">{key}</span><span>{tarifs[key]}€</span></div>)}
      {autoRemises.filter(r=>{if(r.condition==="arabe+si")return selectedMatieres.has("Arabe")&&selectedMatieres.has("Sciences Islamiques");if(r.condition==="arabe+coran")return selectedMatieres.has("Arabe")&&selectedMatieres.has("Coran");return false;}).map(r=><div key={r.id} className="flex justify-between text-xs text-purple-700"><span>🏷️ {r.label}</span><span>{r.amount}€</span></div>)}
      {f.selectedRemises.map(rid=>{const r=(remises||[]).find(x=>x.id===rid);return r&&<div key={rid} className="flex justify-between text-xs text-purple-700"><span>🏷️ {r.label}</span><span>{r.amount}€</span></div>;})}
      <div className="flex justify-between text-sm font-bold text-emerald-800 pt-1 border-t border-emerald-200"><span>Total estimé</span><span>{estTotal}€</span></div>
    </div>}

    <label className="flex items-center gap-2 text-sm cursor-pointer pt-2 border-t border-gray-100">
      <input type="checkbox" checked={f.isAlsoTeacher} onChange={e=>u("isAlsoTeacher",e.target.checked)} className="rounded"/>
      <span className="font-medium text-gray-700">👨‍🏫 Cet élève est aussi enseignant</span></label>
    {f.isAlsoTeacher&&<div className="pl-6"><p className="text-xs text-gray-500 mb-1">Matières enseignées :</p>
      <div className="flex flex-wrap gap-1">{subjects.map(s=>{const sel=f.teacherSubjects.includes(s.id);
        return <button key={s.id} type="button" onClick={()=>sF(p=>({...p,teacherSubjects:sel?p.teacherSubjects.filter(x=>x!==s.id):[...p.teacherSubjects,s.id]}))}
          className={`px-2 py-1 rounded text-xs border ${sel?"bg-purple-100 border-purple-400 text-purple-800":"border-gray-200"}`}>{s.name}</button>})}</div></div>}

    <div className="flex justify-end gap-2 pt-3 border-t"><Btn variant="secondary" onClick={onCancel}>Annuler</Btn>
      <Btn onClick={()=>{if(!canSubmit)return;if(isRedlisted&&isAdmin){if(!confirm("LISTE ROUGE - Forcer inscription ?"))return}onSubmit(f)}} disabled={!canSubmit}>{isRedlisted?(isAdmin?"Forcer inscription (directeur)":"Inscription bloquee"):"Enregistrer ("+f.selectedClasses.length+" classe"+(f.selectedClasses.length>1?"s":"")+")"}</Btn></div>
  </div>;
}

/*═══════════════════════════════════════════════════════════════
  CLASSES (point 5,15)

function ClassesPage({D,set}){
  const {classes,teachers,user}=D;const [search,setSearch]=useState("");const [filterM,setFilterM]=useState("all");const [editM,setEditM]=useState(null);
  const filtered=classes.filter(c=>{if(filterM!=="all"&&c.matiere!==filterM)return false;if(search&&!c.label.toLowerCase().includes(search.toLowerCase()))return false;return true});
  return <div className="space-y-5">
    <div className="flex items-center justify-between"><div><h2 className="text-2xl font-bold">Classes & Quotas</h2></div>
      {user.role==="admin"&&<Btn onClick={()=>setEditM({id:uid(),code:"",label:"",type:"Mixte",quota:20,enrolled:0,matiere:"Arabe",teacherIds:[],isNew:true})}>＋ Classe</Btn>}</div>
    <div className="flex gap-3"><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Rechercher…" className="flex-1 px-3 py-2 border rounded-lg text-sm outline-none"/>
      <Sel value={filterM} onChange={e=>setFilterM(e.target.value)} options={[{value:"all",label:"Toutes"},{value:"Arabe",label:"Arabe"},{value:"Coran",label:"Coran"},{value:"Sciences Islamiques",label:"SI"}]}/></div>
    <div className="bg-white rounded-xl border shadow-sm overflow-x-auto"><table className="w-full text-sm"><thead><tr className="bg-gray-50 border-b">
      <th className="text-left px-4 py-3 font-semibold text-gray-600">Classe</th><th className="text-left px-4 py-3 font-semibold text-gray-600">Matière</th>
      <th className="text-left px-4 py-3 font-semibold text-gray-600">Enseignant(s)</th><th className="text-left px-4 py-3 font-semibold text-gray-600 w-56">Remplissage</th>
      {user.role==="admin"&&<th className="text-right px-4 py-3">⚙</th>}
    </tr></thead><tbody className="divide-y divide-gray-100">{filtered.map(c=>{
      const tNames=(c.teacherIds||[]).map(tid=>teachers.find(t=>t.id===tid)?.name).filter(Boolean);
      return <tr key={c.id} className="hover:bg-gray-50/50">
        <td className="px-4 py-2"><span className="font-medium">{c.label}</span><br/><span className="text-xs text-gray-400 font-mono">{c.code}</span></td>
        <td className="px-4 py-2"><Badge color={c.matiere==="Arabe"?"green":c.matiere==="Coran"?"blue":"purple"}>{c.matiere}</Badge> <span className="text-xs text-gray-400">{c.type}</span></td>
        <td className="px-4 py-2 text-xs text-gray-600">{tNames.length>0?tNames.join(", "):<span className="text-gray-300">Non affecté</span>}</td>
        <td className="px-4 py-2"><QuotaBar enrolled={c.enrolled} quota={c.quota}/></td>
        {user.role==="admin"&&<td className="px-4 py-2 text-right"><button onClick={()=>setEditM({...c})} className="p-1 hover:bg-gray-100 rounded text-gray-400">✏️</button></td>}
      </tr>})}</tbody></table></div>
    <Modal open={!!editM} onClose={()=>setEditM(null)} title={editM?.isNew?"Nouvelle classe":"Modifier"}>
      {editM&&<div className="space-y-3">
        <div className="grid grid-cols-2 gap-3"><Inp label="Code" value={editM.code} onChange={e=>setEditM({...editM,code:e.target.value})}/><Inp label="Libellé" value={editM.label} onChange={e=>setEditM({...editM,label:e.target.value})}/></div>
        <div className="grid grid-cols-3 gap-3">
          <Sel label="Matière" value={editM.matiere} onChange={e=>setEditM({...editM,matiere:e.target.value})} options={[{value:"Arabe",label:"Arabe"},{value:"Coran",label:"Coran"},{value:"Sciences Islamiques",label:"SI"}]}/>
          <Sel label="Type" value={editM.type} onChange={e=>setEditM({...editM,type:e.target.value})} options={[{value:"Mixte",label:"Mixte"},{value:"Fille",label:"Fille"},{value:"Garçon",label:"Garçon"}]}/>
          <Inp label="Quota" type="number" value={editM.quota} onChange={e=>setEditM({...editM,quota:parseInt(e.target.value)||0})}/></div>
        <div><label className="block text-xs font-medium text-gray-600 mb-1">Enseignants (multi-sélection)</label>
          <div className="flex flex-wrap gap-1">{teachers.map(t=>{const sel=(editM.teacherIds||[]).includes(t.id);
            return <button key={t.id} type="button" onClick={()=>setEditM(p=>({...p,teacherIds:sel?p.teacherIds.filter(x=>x!==t.id):[...(p.teacherIds||[]),t.id]}))}
              className={`px-2 py-1 rounded text-xs border ${sel?"bg-emerald-100 border-emerald-400":"border-gray-200"}`}>{t.name}{sel&&" ✓"}</button>})}</div></div>
        <div className="flex justify-end gap-2 pt-3"><Btn variant="secondary" onClick={()=>setEditM(null)}>Annuler</Btn>
          <Btn onClick={()=>{const{isNew,...d}=editM;if(isNew)set.setClasses(p=>[...p,d]);else set.setClasses(p=>p.map(c=>c.id===d.id?d:c));setEditM(null)}}>{editM.isNew?"Créer":"Enregistrer"}</Btn></div>
      </div>}
    </Modal>
  </div>;
}

/*═══════════════════════════════════════════════════════════════
  PAIEMENTS — Échéancier avancé (points 6,7)
═══════════════════════════════════════════════════════════════*/
function PaymentsPage({D,set}){
  const {invoices,students,redlist,user}=D;
  const [search,setSearch]=useState("");const [filterS,setFilterS]=useState("all");const [payM,setPayM]=useState(null);const [rejM,setRejM]=useState(null);const [schedM,setSchedM]=useState(null);const [printM,setPrintM]=useState(null);
  const [tab,setTab]=useState("factures");
  const enriched=invoices.map(i=>({...i,student:students.find(s=>s.id===i.studentId)}));
  const filtered=enriched.filter(i=>{if(filterS!=="all"&&i.status!==filterS)return false;
    if(search&&i.student){const q=search.toLowerCase();if(!i.student.nom.toLowerCase().includes(q)&&!i.student.prenom.toLowerCase().includes(q))return false}return true});
  const totalPaid=invoices.reduce((s,i)=>s+i.paid,0),totalDue=invoices.reduce((s,i)=>s+(i.total-i.paid),0);
  function printDoc(inv,type){setPrintM({inv,type})}
  // Collect all schedule items across invoices for the Échéancier view
  const allSchedules=[];invoices.forEach(inv=>{const st=students.find(s=>s.id===inv.studentId);
    (inv.schedule||[]).forEach(sch=>{allSchedules.push({...sch,invoiceId:inv.id,studentName:st?`${st.prenom} ${st.nom}`:"—"})})});
  allSchedules.sort((a,b)=>(a.date||"").localeCompare(b.date||""));

  function pay(invId,p){set.setInvoices(prev=>prev.map(i=>{if(i.id!==invId)return i;const np=i.paid+p.amount;
    return{...i,paid:np,status:np>=i.total?"Payée":"Partiellement payée",payments:[...(i.payments||[]),p]}}));setPayM(null)}
  function reject(invId,r){set.setInvoices(prev=>prev.map(i=>{if(i.id!==invId)return i;const np=Math.max(0,i.paid-r.amount);
    return{...i,paid:np,status:np>0?"Partiellement payée":"Impayée",payments:[...(i.payments||[]),{...r,amount:-r.amount,method:"REJET: "+r.method}]}}));setRejM(null)}
  function saveSchedule(invId,schedule){set.setInvoices(prev=>prev.map(i=>i.id===invId?{...i,schedule}:i));setSchedM(null)}

  // Export Excel de l'échéancier via SheetJS (CDN chargé dynamiquement)
  async function exportEcheancierExcel(){
    try{
      // Charger SheetJS dynamiquement si pas encore chargé
      if(!window.XLSX){
        await new Promise((res,rej)=>{
          const s=document.createElement("script");
          s.src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
          s.onload=res;s.onerror=rej;document.head.appendChild(s);
        });
      }
      const XLSX=window.XLSX;
      const rows=allSchedules.map(sch=>({
        "Date d'encaissement":String(sch.date||""),
        "Élève":String(sch.studentName||""),
        "Montant (€)":Number(sch.amount)||0,
        "Mode de règlement":String(sch.method||"—"),
        "N° chèque / Réf.":String(sch.ref||"—"),
        "Statut":String(sch.status||""),
      }));
      const ws=XLSX.utils.json_to_sheet(rows);
      // Largeurs colonnes
      ws["!cols"]=[{wch:18},{wch:28},{wch:14},{wch:20},{wch:22},{wch:14}];
      const wb=XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb,"Échéancier",ws);
      XLSX.writeFile(wb,"Echeancier_ElFaouz_"+today()+".xlsx");
    }catch(e){alert("Erreur export Excel : "+e.message);}
  }

  return <div className="space-y-5">
    <div><h2 className="text-2xl font-bold">Paiements & Échéanciers</h2>
      <p className="text-sm text-gray-500">{totalPaid.toLocaleString()}€ encaissés / {totalDue.toLocaleString()}€ restant</p></div>
    <Tabs tabs={[{id:"factures",label:"💳 Factures"},{id:"echeancier",label:`📅 Échéancier (${allSchedules.length})`}]} active={tab} onChange={setTab}/>

    {tab==="echeancier"&&<div className="space-y-4">
      <div className="flex items-center justify-between flex-wrap gap-3">
        <div>
          <p className="text-sm text-gray-600">Calendrier de remise des chèques — triés par date d'encaissement</p>
          {allSchedules.length>0&&<p className="text-xs text-gray-400 mt-0.5">
            Total échéancé : <strong>{allSchedules.reduce((s,x)=>s+x.amount,0).toLocaleString()}€</strong>
            {" · "}{allSchedules.filter(x=>x.method==="Chèque").length} chèque(s)
            {" · "}{allSchedules.filter(x=>x.status==="À venir").length} à venir
          </p>}
        </div>
        {allSchedules.length>0&&<Btn onClick={exportEcheancierExcel} variant="secondary">
          📊 Exporter Excel
        </Btn>}
      </div>
      {allSchedules.length===0?<EmptyState icon="📅" text="Aucun échéancier configuré"/>:
      <div className="bg-white rounded-xl border shadow-sm overflow-x-auto"><table className="w-full text-sm"><thead><tr className="bg-gray-50 border-b">
        <th className="text-left px-4 py-3 font-semibold text-gray-600">Date encaissement</th>
        <th className="text-left px-4 py-3 font-semibold text-gray-600">Élève</th>
        <th className="text-right px-4 py-3 font-semibold text-gray-600">Montant</th>
        <th className="text-left px-4 py-3 font-semibold text-gray-600">Mode</th>
        <th className="text-left px-4 py-3 font-semibold text-gray-600">N° chèque / Réf.</th>
        <th className="text-left px-4 py-3 font-semibold text-gray-600">Statut</th>
      </tr></thead><tbody className="divide-y divide-gray-100">{allSchedules.map((sch,i)=>{
        const isPast=sch.date<today();const isToday=sch.date===today();
        return <tr key={i} className={`${isToday?"bg-amber-50":isPast&&sch.status==="À venir"?"bg-red-50/50":""}`}>
          <td className="px-4 py-2 font-medium">{sch.date} {isToday&&<Badge color="orange">Aujourd'hui</Badge>} {isPast&&sch.status==="À venir"&&<Badge color="red">En retard</Badge>}</td>
          <td className="px-4 py-2">{sch.studentName}</td>
          <td className="px-4 py-2 text-right font-bold">{sch.amount}€</td>
          <td className="px-4 py-2">{sch.method||"—"}</td>
          <td className="px-4 py-2 text-xs font-mono">{sch.ref||<span className="text-red-400 italic">manquant</span>}</td>
          <td className="px-4 py-2"><Badge color={sch.status==="À venir"?"blue":sch.status==="Payée"?"green":"red"}>{sch.status}</Badge></td>
        </tr>})}</tbody></table></div>}
    </div>}

    {tab==="factures"&&<div className="space-y-4">
    <div className="grid grid-cols-3 gap-4">
      <SC icon="✅" label="Payées" value={invoices.filter(i=>i.status==="Payée").length} color="#047857"/>
      <SC icon="⏳" label="Partielles" value={invoices.filter(i=>i.status==="Partiellement payée").length} color="#d97706"/>
      <SC icon="❌" label="Impayées" value={invoices.filter(i=>i.status==="Impayée").length} color="#dc2626"/></div>
    <div className="flex gap-3"><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍" className="flex-1 px-3 py-2 border rounded-lg text-sm outline-none"/>
      <Sel value={filterS} onChange={e=>setFilterS(e.target.value)} options={[{value:"all",label:"Tous"},{value:"Payée",label:"Payée"},{value:"Partiellement payée",label:"Partielle"},{value:"Impayée",label:"Impayée"}]}/></div>
    <div className="bg-white rounded-xl border shadow-sm overflow-x-auto"><table className="w-full text-sm"><thead><tr className="bg-gray-50 border-b">
      <th className="text-left px-4 py-3 font-semibold text-gray-600">Élève</th><th className="text-left px-4 py-3 font-semibold text-gray-600">Détail</th>
      <th className="text-right px-4 py-3 font-semibold text-gray-600">Total</th><th className="text-right px-4 py-3 font-semibold text-gray-600">Payé</th>
      <th className="text-right px-4 py-3 font-semibold text-gray-600">Reste</th><th className="text-left px-4 py-3">Statut</th>
      <th className="text-left px-4 py-3">Échéancier</th><th className="text-right px-4 py-3">Actions</th>
    </tr></thead><tbody className="divide-y divide-gray-100">{filtered.map(inv=>{
      const sched=inv.schedule||[];
      return <tr key={inv.id} className="hover:bg-gray-50/50">
        <td className="px-4 py-2 font-medium">{inv.student?`${inv.student.prenom} ${inv.student.nom}`:"—"}</td>
        <td className="px-4 py-2 text-gray-600 text-xs">{inv.items.map(i=>i.label).join(" + ")}</td>
        <td className="px-4 py-2 text-right font-medium">{inv.total}€</td>
        <td className="px-4 py-2 text-right text-emerald-700 font-medium">{inv.paid}€</td>
        <td className="px-4 py-2 text-right text-red-600 font-medium">{inv.total-inv.paid>0?`${inv.total-inv.paid}€`:"—"}</td>
        <td className="px-4 py-2"><SB status={inv.status}/></td>
        <td className="px-4 py-2 text-xs">{sched.length>0?<span className="text-blue-600 font-medium">{sched.length} échéances</span>:<span className="text-gray-300">—</span>}</td>
        <td className="px-4 py-2 text-right"><div className="flex items-center justify-end gap-1">
          {inv.status!=="Payée"&&<Btn size="sm" onClick={()=>setPayM(inv)}>💰</Btn>}
          {inv.status!=="Payée"&&<Btn size="sm" variant="secondary" onClick={()=>setSchedM(inv)}>📅</Btn>}
          {inv.paid>0&&<Btn size="sm" variant="danger" onClick={()=>setRejM(inv)}>Rejet</Btn>}
          <Btn size="sm" variant="ghost" onClick={()=>printDoc(inv,"facture")}>📄</Btn>
          {inv.paid>0&&<Btn size="sm" variant="ghost" onClick={()=>printDoc(inv,"recu")}>🧾</Btn>}
        </div></td></tr>})}</tbody></table></div>
    </div>}
    <Modal open={!!payM} onClose={()=>setPayM(null)} title="Encaisser">
      {payM&&<PayFormAdv inv={payM} onSubmit={p=>pay(payM.id,p)} onCancel={()=>setPayM(null)}/>}</Modal>
    <Modal open={!!schedM} onClose={()=>setSchedM(null)} title="Échéancier de paiement">
      {schedM&&<ScheduleForm inv={schedM} onSave={s=>saveSchedule(schedM.id,s)} onCancel={()=>setSchedM(null)}/>}</Modal>
    <Modal open={!!rejM} onClose={()=>setRejM(null)} title="Rejet de paiement">

    <Modal open={!!printM} onClose={()=>setPrintM(null)} title={printM?.type==="facture"?"Facture":"Reçu de paiement"} wide>
