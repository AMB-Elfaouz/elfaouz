function ScheduleForm({inv,onSave,onCancel}){
  const remaining=inv.total-inv.paid;

  // Génère N échéances avec montants répartis et dates auto (+1 mois chacune)
  function buildSchedule(n,existingFirst){
    const base=existingFirst||today();
    // Première date : si un échéancier existe déjà, partir du mois suivant la dernière échéance
    return Array.from({length:n},(_,i)=>{
      const d=new Date((base)+"T12:00");
      d.setMonth(d.getMonth()+i+1);
      const amt=i<n-1?Math.floor(remaining/n):remaining-Math.floor(remaining/n)*(n-1);
      return{date:d.toISOString().slice(0,10),amount:amt,status:"À venir",method:"Chèque",ref:""};
    });
  }

  const initN=inv.schedule?.length||2;
  const [nbEch,setNbEch]=useState(initN);
  const [schedule,setSchedule]=useState(()=>
    inv.schedule?.length>0?inv.schedule:buildSchedule(initN,null)
  );
  const [err,setErr]=useState("");

  // Quand on change le nombre d'échéances → recalcul auto
  function changeNb(n){
    setNbEch(n);
    // Base = mois actuel pour la première date
    setSchedule(buildSchedule(n,null));
  }

  // Quand on ajoute une ligne manuellement → date = dernière date + 1 mois, montant = 0
  function addEch(){
    setSchedule(p=>{
      const last=p[p.length-1];
      let nextDate=today();
      if(last?.date){const d=new Date(last.date+"T12:00");d.setMonth(d.getMonth()+1);nextDate=d.toISOString().slice(0,10);}
      return[...p,{date:nextDate,amount:0,status:"À venir",method:"Chèque",ref:""}];
    });
  }

  // Recalcule les montants en répartissant equitablement sur toutes les lignes
  function rebalance(){
    setSchedule(p=>{
      const n=p.length;if(!n)return p;
      return p.map((e,i)=>{
        const amt=i<n-1?Math.floor(remaining/n):remaining-Math.floor(remaining/n)*(n-1);
        return{...e,amount:amt};
      });
    });
  }

  const upd=(i,k,v)=>setSchedule(p=>p.map((e,j)=>j===i?{...e,[k]:v}:e));
  const totalEch=schedule.reduce((s,e)=>s+(parseFloat(e.amount)||0),0);
  const diff=Math.round((totalEch-remaining)*100)/100;

  function handleSave(){
    // Validation : n° chèque obligatoire si mode Chèque
    const missing=schedule.filter(e=>e.method==="Chèque"&&!e.ref?.trim());
    if(missing.length>0){setErr("⚠️ Le numéro de chèque est obligatoire pour les paiements par chèque ("+missing.length+" ligne(s) manquante(s)).");return;}
    if(Math.abs(diff)>0.01){setErr("⚠️ Le total échéancé ("+totalEch+"€) ne correspond pas au reste dû ("+remaining+"€). Utilisez 'Rééquilibrer' ou ajustez les montants.");return;}
    setErr("");onSave(schedule);
  }

  return <div className="space-y-4">
    <div className="flex items-center justify-between">
      <p className="text-sm">Reste à échéancier : <strong className="text-red-600">{remaining}€</strong></p>
      <div className="flex items-center gap-3">
        <label className="text-xs text-gray-600 font-medium">Nb d'échéances :</label>
        <select value={nbEch} onChange={e=>changeNb(parseInt(e.target.value))}
          className="border rounded px-2 py-1 text-sm outline-none focus:ring-2 focus:ring-emerald-500">
          {[1,2,3,4,5,6,8,10,12].map(n=><option key={n} value={n}>{n}</option>)}
        </select>
        <Btn size="sm" variant="secondary" onClick={rebalance}>⚖️ Rééquilibrer</Btn>
      </div>
    </div>

    <div className="overflow-x-auto">
      <table className="w-full text-sm border-collapse">
        <thead><tr className="bg-gray-50 border-b">
          <th className="text-left px-2 py-2 font-semibold text-gray-600 w-32">Date</th>
          <th className="text-left px-2 py-2 font-semibold text-gray-600 w-24">Montant €</th>
          <th className="text-left px-2 py-2 font-semibold text-gray-600 w-28">Mode</th>
          <th className="text-left px-2 py-2 font-semibold text-gray-600">N° chèque <span className="text-red-500">*</span> <span className="text-gray-400 font-normal">(si chèque)</span></th>
          <th className="w-8"></th>
        </tr></thead>
        <tbody className="divide-y divide-gray-100">
          {schedule.map((e,i)=><tr key={i} className="hover:bg-gray-50/50">
            <td className="px-2 py-1.5"><input type="date" value={e.date} onChange={ev=>upd(i,"date",ev.target.value)}
              className="w-full px-2 py-1 border rounded text-xs focus:ring-1 focus:ring-emerald-500 outline-none"/></td>
            <td className="px-2 py-1.5"><input type="number" value={e.amount} onChange={ev=>upd(i,"amount",parseFloat(ev.target.value)||0)}
              className="w-full px-2 py-1 border rounded text-xs focus:ring-1 focus:ring-emerald-500 outline-none text-right"/></td>
            <td className="px-2 py-1.5"><select value={e.method} onChange={ev=>upd(i,"method",ev.target.value)}
              className="w-full px-2 py-1 border rounded text-xs focus:ring-1 focus:ring-emerald-500 outline-none bg-white">
              <option value="Chèque">Chèque</option><option value="CB">CB</option><option value="Virement">Virement</option><option value="Espèces">Espèces</option>
            </select></td>
            <td className="px-2 py-1.5"><input value={e.ref} onChange={ev=>upd(i,"ref",ev.target.value)}
              placeholder={e.method==="Chèque"?"N° chèque obligatoire…":"Référence optionnelle"}
              className={`w-full px-2 py-1 border rounded text-xs focus:ring-1 outline-none ${e.method==="Chèque"&&!e.ref?.trim()?"border-red-300 bg-red-50 focus:ring-red-400":"focus:ring-emerald-500"}`}/></td>
            <td className="px-2 py-1.5"><button onClick={()=>setSchedule(p=>p.filter((_,j)=>j!==i))}
              className="p-1 hover:bg-red-50 rounded text-red-400 text-xs">🗑</button></td>
          </tr>)}
        </tbody>
      </table>
    </div>

    <div className="flex items-center justify-between text-xs">
      <button type="button" onClick={addEch} className="text-emerald-700 font-medium hover:underline">＋ Ajouter une ligne</button>
      <span className={`font-semibold ${Math.abs(diff)>0.01?"text-red-600":"text-emerald-700"}`}>
        Total : {totalEch}€ / {remaining}€ {Math.abs(diff)>0.01?`(écart : ${diff>0?"+":""}${diff}€)`:"✓"}
      </span>
    </div>

    {err&&<div className="p-3 bg-red-50 border border-red-200 rounded-lg text-xs text-red-700 font-medium">{err}</div>}

    <div className="flex justify-end gap-2 pt-2">
      <Btn variant="secondary" onClick={onCancel}>Annuler</Btn>
      <Btn onClick={handleSave}>Enregistrer l'échéancier</Btn>
    </div>
  </div>;
}

function AppelTab({D,set}){
  const {classes,students,enrollments,teachers,user,edt,absences,teacherAbsences}=D;
  const [selSlot,setSelSlot]=useState("");const [records,setRecords]=useState({});const [appelDate,setAppelDate]=useState(today());
  const jourMap={"0":"Dimanche","1":"Lundi","2":"Mardi","3":"Mercredi","4":"Jeudi","5":"Vendredi","6":"Samedi"};
  const selectedJour=jourMap[new Date(appelDate+"T12:00").getDay()]||"";
  const availSlots=useMemo(()=>{
    const filtered=edt.filter(s=>{
      if(s.date)return s.date===appelDate;
      return s.jour===selectedJour});
    if(user.role==="enseignant"&&user.teacherId){
      // Get classes of teachers this user is replacing today
      const replacingAbsences=(teacherAbsences||[]).filter(a=>a.replacedById===user.teacherId&&a.date===appelDate);
      const replacingTeacherIds=new Set(replacingAbsences.map(a=>a.teacherId));
      const absentTeachersClassIds=new Set();
      replacingAbsences.forEach(a=>{const t=teachers.find(x=>x.id===a.teacherId);(t?.classIds||[]).forEach(cid=>absentTeachersClassIds.add(cid));});
      return filtered.filter(s=>(s.teacherIds||[]).includes(user.teacherId)||
        (s.teacherIds||[]).some(tid=>replacingTeacherIds.has(tid))||
        absentTeachersClassIds.has(s.classId));
    }
    return filtered},[edt,user,selectedJour,appelDate,D.teacherAbsences,teachers]);
  const allSlots=useMemo(()=>{
    if(user.role==="enseignant"&&user.teacherId){
      const replacingAbsences=(teacherAbsences||[]).filter(a=>a.replacedById===user.teacherId&&a.date===today());
      const replacingTeacherIds=new Set(replacingAbsences.map(a=>a.teacherId));
      const absentTeachersClassIds=new Set();
      replacingAbsences.forEach(a=>{const t=teachers.find(x=>x.id===a.teacherId);(t?.classIds||[]).forEach(cid=>absentTeachersClassIds.add(cid));});
      return edt.filter(s=>(s.teacherIds||[]).includes(user.teacherId)||
        (s.teacherIds||[]).some(tid=>replacingTeacherIds.has(tid))||
        absentTeachersClassIds.has(s.classId));
    }
    return edt},[edt,user,D.teacherAbsences,teachers]);
  const [showAllDays,setShowAllDays]=useState(false);
  const displaySlots=showAllDays?allSlots:availSlots;

  const selSlotObj=edt.find(s=>s.id===selSlot);
  const selClassId=selSlotObj?.classId;
  const selClassObj=selClassId?classes.find(c=>c.id===selClassId):null;
  const classStudents=useMemo(()=>{if(!selClassId)return[];
    return enrollments.filter(e=>e.classId===selClassId&&e.status==="Inscription acceptée").map(e=>students.find(s=>s.id===e.studentId)).filter(Boolean)},[selClassId,enrollments,students]);
  // Pre-fill records with existing absences for this class+date
  // Date effective du slot sélectionné : si le slot a une date fixe → on l'utilise,
  // sinon c'est la date affichée dans le sélecteur (appelDate).
  const selSlotEffectiveDate=selSlotObj?.date||appelDate;
  const existingAbs=useMemo(()=>{if(!selClassId||!selSlotEffectiveDate)return[];
    return absences.filter(a=>a.classId===selClassId&&a.date===selSlotEffectiveDate)},[absences,selClassId,selSlotEffectiveDate]);
  const appelDejeFait=existingAbs.length>0;
  useEffect(()=>{if(selSlot&&selClassId){const r={};existingAbs.forEach(a=>{r[a.studentId]=a.type});setRecords(r)}},[selSlot,selClassId,selSlotEffectiveDate]);
  // Types: null/undefined=présent, "absent_justifie", "absent_injustifie", "retard"
  const toggle=(sid,type)=>setRecords(p=>({...p,[sid]:p[sid]===type?null:type}));
  const absentC=Object.values(records).filter(v=>v==="absent_justifie"||v==="absent_injustifie"||v==="absent").length;
  const retardC=Object.values(records).filter(v=>v==="retard").length;
  function validerAppel(){
    const dateAppel=selSlotEffectiveDate;
    set.setAbsences(p=>{const filtered=p.filter(a=>!(a.classId===selClassId&&a.date===dateAppel));
      const newAbs=Object.entries(records).filter(([,type])=>type).map(([sid,type])=>({id:uid(),studentId:sid,classId:selClassId,date:dateAppel,
        type,
        justified:type==="absent_justifie",
        justification:type==="absent_justifie"?"Absence justifiée":"",
        notified:false}));
      return[...filtered,...newAbs]});
    alert("Appel enregistre pour le "+dateAppel+" ! "+absentC+" absent(s), "+retardC+" retard(s), "+(classStudents.length-absentC-retardC)+" present(s)");}

  return <div className="space-y-4">
    <div className="p-3 bg-blue-50 rounded-lg border border-blue-200 text-sm flex items-center justify-between flex-wrap gap-2">
      <div><p className="font-bold text-blue-800">Appel du : {selectedJour} {appelDate}</p>
        {availSlots.length>0?<p className="text-blue-600 text-xs">{availSlots.length} cours prevu(s)</p>
          :<p className="text-blue-600 text-xs">Aucun cours ce jour</p>}</div>

      <label className="flex items-center gap-2 text-xs cursor-pointer"><input type="checkbox" checked={showAllDays} onChange={e=>setShowAllDays(e.target.checked)} className="rounded"/>Afficher tous les jours</label>
    </div>
    {displaySlots.length>0?<div className="grid grid-cols-1 md:grid-cols-2 gap-2">
      {displaySlots.map(s=>{const cl=classes.find(c=>c.id===s.classId);const profs=(s.teacherIds||[]).map(tid=>teachers.find(t=>t.id===tid)?.name).filter(Boolean);
        const isSel=selSlot===s.id;
        // Date effective du créneau :
        // - Si le slot a une date fixe → on l'utilise directement.
        // - Si c'est un créneau récurrent (par jour de semaine) → en mode
        //   "jour sélectionné" tous les slots correspondent à appelDate.
        //   En mode "tous les jours", chaque slot a son propre jour de semaine :
        //   on calcule la date de la semaine courante (semaine de appelDate)
        //   qui correspond à ce jour de semaine.
        const jourIndexMap={"Lundi":1,"Mardi":2,"Mercredi":3,"Jeudi":4,"Vendredi":5,"Samedi":6,"Dimanche":0};
        function getEffectiveDate(slot){
          if(slot.date)return slot.date;
          if(!showAllDays)return appelDate; // mode "jour du" → tous les slots = appelDate
          // mode "tous les jours" : trouver la date du slot.jour dans la semaine de appelDate
          const base=new Date(appelDate+"T12:00");
          const baseDow=base.getDay(); // 0=dim..6=sam
          const targetDow=jourIndexMap[slot.jour]??baseDow;
          const diff=targetDow-baseDow;
          const d=new Date(base);d.setDate(d.getDate()+diff);
          return d.toISOString().slice(0,10);
        }
        const slotEffectiveDate=getEffectiveDate(s);
        const slotDone=absences.some(a=>a.classId===s.classId&&a.date===slotEffectiveDate);
        return <button key={s.id} onClick={()=>setSelSlot(s.id)}
          className={`text-left p-3 rounded-lg border-2 transition ${isSel?"border-emerald-500 bg-emerald-50":slotDone?"border-emerald-200 bg-emerald-50/40":"border-gray-200 hover:border-gray-300"}`}>
          <div className="flex justify-between items-center">
            <div><p className="text-sm font-bold">{s.jour} {slotEffectiveDate} {s.heureDebut}-{s.heureFin}</p>
              <p className="text-xs text-gray-600">{cl?.label||"--"} — {s.salle}</p>
              <p className="text-xs text-gray-400">{profs.join(", ")||"Non affecte"}</p></div>
            <div className="text-right">
              {slotDone?<span className="text-xs bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded font-medium">✅ Appel fait</span>
                :<span className="text-xs bg-orange-50 text-orange-600 px-2 py-0.5 rounded font-medium">⏳ Non fait</span>}
              {isSel&&<span className="text-emerald-600 font-bold text-lg block">✓</span>}</div>
          </div></button>})}
    </div>:<EmptyState icon="📅" text={showAllDays?"Aucun creneau dans l'emploi du temps":"Aucun cours aujourd'hui"}/>}

    {selSlotObj&&classStudents.length>0&&<div className="bg-white rounded-xl border shadow-sm overflow-hidden mt-2">
      <div className="px-4 py-3 bg-emerald-700 text-white flex justify-between items-center">
        <div><p className="text-sm font-bold">Appel — {selSlotObj.jour} {selSlotObj.date||appelDate} {selSlotObj.heureDebut}-{selSlotObj.heureFin}</p>
          <p className="text-xs opacity-80">{selClassObj?.label} — {selSlotObj.salle} — {classStudents.length} eleves</p></div>
        <div className="flex items-center gap-2">{appelDejeFait&&<span className="text-xs bg-white/20 px-2 py-1 rounded">Appel deja enregistre — modifiable</span>}
          <Btn size="sm" variant="secondary" onClick={validerAppel}>{appelDejeFait?"Mettre a jour":"Valider l appel"}</Btn></div></div>
      <div className="px-4 py-2 bg-gray-50 border-b text-xs text-gray-500">
        <span className="text-red-600 font-medium">{Object.values(records).filter(v=>v==="absent_injustifie").length} abs. injust.</span>
        {" — "}<span className="text-blue-600 font-medium">{Object.values(records).filter(v=>v==="absent_justifie").length} abs. just.</span>
        {" — "}<span className="text-orange-600 font-medium">{retardC} retard(s)</span> — {classStudents.length-absentC-retardC} present(s)</div>
      <div className="divide-y divide-gray-100">{classStudents.map(s=>{const r=records[s.id];
        return <div key={s.id} className={`flex items-center justify-between px-4 py-2 ${r==="absent_injustifie"||r==="absent"?"bg-red-50":r==="absent_justifie"?"bg-blue-50":r==="retard"?"bg-orange-50":""}`}>
          <div><p className="text-sm font-medium">{s.prenom} {s.nom}</p></div>
          <div className="flex gap-1 flex-wrap">
            <button onClick={()=>toggle(s.id,"absent_justifie")} className={`px-2 py-1 rounded text-xs font-medium border ${r==="absent_justifie"?"bg-blue-600 text-white border-blue-600":"border-gray-300 hover:border-blue-300"}`}>Abs. Justifiée</button>
            <button onClick={()=>toggle(s.id,"absent_injustifie")} className={`px-2 py-1 rounded text-xs font-medium border ${r==="absent_injustifie"?"bg-red-500 text-white border-red-500":"border-gray-300 hover:border-red-300"}`}>Abs. Injustifiée</button>
            <button onClick={()=>toggle(s.id,"retard")} className={`px-2 py-1 rounded text-xs font-medium border ${r==="retard"?"bg-orange-500 text-white border-orange-500":"border-gray-300 hover:border-orange-300"}`}>Retard</button>
            <button onClick={()=>toggle(s.id,null)} className={`px-2 py-1 rounded text-xs font-medium border ${!r?"bg-emerald-500 text-white border-emerald-500":"border-gray-300"}`}>Présent</button>
          </div></div>})}</div></div>}
    {selSlotObj&&classStudents.length===0&&<EmptyState icon="📋" text="Aucun eleve inscrit dans cette classe"/>}
  </div>;
}
function AbsencesEleves({D,set}){
  const {absences,students,classes,emailHistory}=D;const [search,setSearch]=useState("");const [selected,setSelected]=useState(new Set());
  const enriched=absences.filter(a=>{const s=students.find(x=>x.id===a.studentId);if(!s)return false;if(search&&!s.nom.toLowerCase().includes(search.toLowerCase())&&!s.prenom.toLowerCase().includes(search.toLowerCase()))return false;return true})
    .map(a=>({...a,student:students.find(s=>s.id===a.studentId),classe:classes.find(c=>c.id===a.classId)})).sort((a,b)=>b.date.localeCompare(a.date));
  const unnotified=enriched.filter(a=>!a.notified&&!a.justified);
  function justify(absId,justification){set.setAbsences(p=>p.map(a=>a.id===absId?{...a,justified:true,justification}:a))}
  function toggleSel(id){setSelected(p=>{const n=new Set(p);if(n.has(id))n.delete(id);else n.add(id);return n})}
  function selectAll(){if(selected.size===unnotified.length)setSelected(new Set());else setSelected(new Set(unnotified.map(a=>a.id)))}
  function massNotify(){
    const toNotify=enriched.filter(a=>selected.has(a.id));
    const emailsSent=[];
    toNotify.forEach(a=>{
      const st=a.student;if(!st)return;
      const email=st.email||(st.rep1&&st.rep1.email)||"";
      if(!email||!email.includes("@")){emailsSent.push({date:today(),studentName:`${st.prenom} ${st.nom}`,email:"",status:"Échec — pas d'email"});return}
      emailsSent.push({date:today(),studentName:`${st.prenom} ${st.nom}`,email,status:"Envoyé",absDate:a.date,type:a.type});
    });
    // Mark as notified
    set.setAbsences(p=>p.map(a=>selected.has(a.id)?{...a,notified:true}:a));
    // Save email history
    set.setEmailHistory(p=>[...p,...emailsSent]);
    // Open mailto for all valid emails
    const validEmails=[...new Set(toNotify.map(a=>{const st=a.student;return st?.email||(st?.rep1?.email)||""}).filter(e=>e&&e.includes("@")))];
    if(validEmails.length>0){
      const subject=encodeURIComponent("Notification d'absence — Institut El Faouz");
      const body=encodeURIComponent("Bonjour,\n\nNous vous informons que votre enfant / vous-même avez été noté(e) absent(e) ou en retard.\n\nMerci de prendre contact avec le secrétariat.\n\nCordialement,\nInstitut El Faouz");
      window.open(`mailto:${validEmails.join(",")}?subject=${subject}&body=${body}`)}
    alert(`${emailsSent.filter(e=>e.status==="Envoyé").length} notification(s) envoyée(s), ${emailsSent.filter(e=>e.status!=="Envoyé").length} échec(s) (pas d'email)`);
    setSelected(new Set());
  }

      {unnotified.length>0&&<div className="flex gap-2">
        <Btn size="sm" variant="secondary" onClick={selectAll}>{selected.size===unnotified.length?"Tout désélectionner":`Tout sélectionner (${unnotified.length})`}</Btn>
        {selected.size>0&&<Btn size="sm" variant="warning" onClick={massNotify}>✉ Notifier {selected.size} absence(s) en masse</Btn>}
      </div>}
    </div>
    {enriched.length===0?<EmptyState icon="✅" text="Aucune absence enregistrée"/>:
    <div className="bg-white rounded-xl border shadow-sm overflow-x-auto"><table className="w-full text-sm"><thead><tr className="bg-gray-50 border-b">
      <th className="px-3 py-3 w-8"></th>
      <th className="text-left px-3 py-3 font-semibold text-gray-600">Date</th><th className="text-left px-3 py-3 font-semibold text-gray-600">Élève</th>
      <th className="text-left px-3 py-3 font-semibold text-gray-600">Email</th>
      <th className="text-left px-3 py-3 font-semibold text-gray-600">Classe</th><th className="text-left px-3 py-3">Type</th>
      <th className="text-left px-3 py-3">Justifié</th><th className="text-left px-3 py-3">Notifié</th><th className="text-right px-3 py-3">Actions</th>
    </tr></thead><tbody className="divide-y divide-gray-100">{enriched.slice(0,100).map(a=>{
      const hasEmail=a.student&&(a.student.email||a.student.rep1?.email);
      return <tr key={a.id} className={`hover:bg-gray-50/50 ${selected.has(a.id)?"bg-amber-50/50":""}`}>
        <td className="px-3 py-2">{!a.notified&&!a.justified&&<input type="checkbox" checked={selected.has(a.id)} onChange={()=>toggleSel(a.id)} className="rounded"/>}</td>
        <td className="px-3 py-2 text-xs">{a.date}</td>
        <td className="px-3 py-2 font-medium">{a.student?.prenom} {a.student?.nom}</td>
        <td className="px-3 py-2 text-xs">{hasEmail?<span className="text-green-600">{a.student.email}</span>:<span className="text-red-400">Aucun email</span>}</td>
        <td className="px-3 py-2 text-xs">{a.classe?.label||"—"}</td>
        <td className="px-3 py-2"><Badge color={a.type==="absent_injustifie"?"red":a.type==="absent_justifie"?"blue":"orange"}>
          {a.type==="absent_injustifie"?"Abs. Injustifiée":a.type==="absent_justifie"?"Abs. Justifiée":a.type==="retard"?"Retard":a.type}</Badge></td>

        <td className="px-3 py-2 text-right"><div className="flex justify-end gap-1">

        </div></td></tr>})}</tbody></table></div>}
    {/* Email History */}
    {(emailHistory||[]).length>0&&<div className="mt-4"><h4 className="text-sm font-bold text-gray-700 mb-2">📬 Historique des envois ({emailHistory.length})</h4>
      <div className="bg-white rounded-xl border shadow-sm overflow-x-auto"><table className="w-full text-xs"><thead><tr className="bg-gray-50 border-b">
        <th className="text-left px-3 py-2">Date</th><th className="text-left px-3 py-2">Élève</th><th className="text-left px-3 py-2">Email</th><th className="text-left px-3 py-2">Statut</th>
      </tr></thead><tbody className="divide-y divide-gray-100">{emailHistory.slice(-30).reverse().map((e,i)=>
        <tr key={i}><td className="px-3 py-1.5">{e.date}</td><td className="px-3 py-1.5">{e.studentName}</td><td className="px-3 py-1.5">{e.email||"—"}</td>
          <td className="px-3 py-1.5"><Badge color={e.status==="Envoyé"?"green":"red"}>{e.status}</Badge></td></tr>)}</tbody></table></div></div>}
  </div>;
}

function HistoriqueAbs({D}){
  const {absences,students,classes}=D;
  const [alertComments,setAlertComments]=useState({});
  const grouped={};absences.forEach(a=>{if(!grouped[a.studentId])grouped[a.studentId]={absJ:0,absI:0,ret:0,classIds:new Set()};
    if(a.type==="absent_justifie"||a.type==="absent")grouped[a.studentId].absJ++;
    if(a.type==="absent_injustifie")grouped[a.studentId].absI++;
    if(a.type==="retard")grouped[a.studentId].ret++;
    if(a.classId)grouped[a.studentId].classIds.add(a.classId);
  });
  const rows=Object.entries(grouped).map(([sid,counts])=>{const s=students.find(x=>x.id===sid);
    const cls=[...counts.classIds].map(cid=>classes.find(c=>c.id===cid)?.label).filter(Boolean).join(", ");
    return{student:s,absJ:counts.absJ,absI:counts.absI,ret:counts.ret,classLabel:cls}}).filter(r=>r.student).sort((a,b)=>b.absI-a.absI);
  const alerts=rows.filter(r=>r.absI>=3);
  return <div className="space-y-4">
    <p className="text-sm font-medium">Récapitulatif par élève</p>
    {alerts.length>0&&<div className="bg-red-50 border-2 border-red-500 rounded-xl p-4 space-y-2">
      <h3 className="text-sm font-bold text-red-800">🚨 Convocation requise — 3+ absences injustifiées</h3>
      {alerts.map(r=><div key={r.student.id} className="bg-white border-2 border-red-400 rounded-lg p-3">
        <div className="flex items-center justify-between">
          <div><p className="font-bold text-red-800">{r.student.prenom} {r.student.nom}</p>
            <p className="text-xs text-gray-600">{r.classLabel}</p>
            <p className="text-xs text-red-600 font-bold">⚠️ {r.absI} absence(s) injustifiée(s) — Convoquer parent/élève</p></div>
          <span className="bg-red-600 text-white text-xs font-bold px-2 py-1 rounded">{r.absI} abs. inj.</span>
        </div>
        <div className="flex gap-2 mt-2">
          <input value={alertComments[r.student.id]||""} onChange={e=>setAlertComments(p=>({...p,[r.student.id]:e.target.value}))}
            className="flex-1 px-2 py-1 border border-red-300 rounded text-xs" placeholder="Commentaire tolérance..."/>
          <Btn size="sm" variant="secondary" onClick={()=>{if(alertComments[r.student.id])alert("Commentaire sauvegardé ✅")}}>Sauvegarder</Btn>
        </div>
      </div>)}
    </div>}
    {rows.length===0?<EmptyState icon="📊" text="Aucune donnée"/>:
    <div className="bg-white rounded-xl border shadow-sm overflow-x-auto"><table className="w-full text-sm"><thead><tr className="bg-gray-50 border-b">
      <th className="text-left px-4 py-3">Élève</th><th className="text-left px-4 py-3">Classe</th>
      <th className="text-right px-4 py-3">Abs. Justifiées</th><th className="text-right px-4 py-3">Abs. Injustifiées</th><th className="text-right px-4 py-3">Retards</th>
    </tr></thead><tbody className="divide-y divide-gray-100">{rows.map(r=>
      <tr key={r.student.id} className={r.absI>=3?"bg-red-50":""}>
        <td className="px-4 py-2 font-medium">{r.student.prenom} {r.student.nom}{r.absI>=3&&<span className="ml-2 text-xs bg-red-600 text-white px-1.5 rounded">CONVOQUER</span>}</td>
        <td className="px-4 py-2 text-xs text-gray-500">{r.classLabel}</td>
        <td className="px-4 py-2 text-right"><Badge color={r.absJ>=3?"orange":"gray"}>{r.absJ}</Badge></td>
        <td className="px-4 py-2 text-right"><Badge color={r.absI>=3?"red":"gray"}>{r.absI}</Badge></td>
        <td className="px-4 py-2 text-right"><Badge color={r.ret>=3?"orange":"gray"}>{r.ret}</Badge></td>
      </tr>)}</tbody></table></div>}
  </div>;
}

      const avg=sGrades.length>0?sGrades.reduce((s,g)=>s+normTo20(g.value,g.noteSur||20),0)/sGrades.length:null;
      // Class average for this subject
      const allClassGrades=grades.filter(g=>g.classId===targetClassId&&g.subjectId===subId&&cSids.includes(g.studentId)&&isInTrim(g.date));
      let classAvg=null;
      if(allClassGrades.length>0){const bySt={};allClassGrades.forEach(g=>{if(!bySt[g.studentId])bySt[g.studentId]=[];bySt[g.studentId].push(normTo20(g.value,g.noteSur||20))});
        const stAvgs=Object.values(bySt).map(arr=>arr.reduce((a,b)=>a+b,0)/arr.length);classAvg=stAvgs.reduce((a,b)=>a+b,0)/stAvgs.length}
      return{subject:sub,avg,classAvg,coef:sub.coef}}).filter(Boolean).filter(r=>r.avg!==null);
    // General average with coefficients
    const totalCoef=subjectRows.reduce((s,r)=>s+r.coef,0);
    const moyGen=totalCoef>0?subjectRows.reduce((s,r)=>s+r.avg*r.coef,0)/totalCoef:0;
    // Class general average + ranking
    const classMoys=cSids.map(s3=>{
      const g3=grades.filter(g=>g.studentId===s3&&g.classId===targetClassId&&isInTrim(g.date));
      const subs3=[...new Set(g3.map(g=>g.subjectId))];
      const rows3=subs3.map(sid2=>{const sub=subjects.find(s=>s.id===sid2);if(!sub)return null;
        const sg=g3.filter(g=>g.subjectId===sid2);const a=sg.length?sg.reduce((s,g)=>s+normTo20(g.value,g.noteSur||20),0)/sg.length:null;
        return a!==null?{avg:a,coef:sub.coef}:null}).filter(Boolean);
      const tc=rows3.reduce((s,r)=>s+r.coef,0);return tc>0?{sid:s3,avg:rows3.reduce((s,r)=>s+r.avg*r.coef,0)/tc}:null}).filter(Boolean).sort((a,b)=>b.avg-a.avg);
    const classMoyGen=classMoys.length?classMoys.reduce((s,r)=>s+r.avg,0)/classMoys.length:0;
    const rank=classMoys.filter(r=>r.avg>moyGen+0.001).length+1;
    const stAbs=absences.filter(a=>a.studentId===sid&&a.classId===targetClassId&&a.type==="absent"&&isInTrim(a.date)).length;
    const stRet=absences.filter(a=>a.studentId===sid&&a.classId===targetClassId&&a.type==="retard"&&isInTrim(a.date)).length;
    const sc=stuComments[sid]||{comment:"",appreciation:""};
    const dec=stuDecisions[sid]||"Passage";
    return{student:s2,classLabel:targetClass?.label||"",teacher:tch,subjectRows,moyGen,classMoyGen,rank,total:classMoys.length,abs:stAbs,ret:stRet,comment:sc.comment,appreciation:sc.appreciation,decision:dec}}

    const existingAcc=accounts.find(a=>a.teacherId===teacherId);
    const emailAcc=emailLower?accounts.find(a=>(a.email||"").toLowerCase()===emailLower&&!a.teacherId):null;
    if(existingAcc){
      set.setAccounts(p=>p.map(a=>a.teacherId===teacherId?{...a,
        login:form.login||emailLower||a.login,
        password:form.password||a.password,
        name:form.name,role:"enseignant",
        email:emailLower||a.email,teacherId}:a));
    }else if(emailAcc){
      // Link existing Firebase account to this teacher
      set.setAccounts(p=>p.map(a=>a.id===emailAcc.id?{...a,name:form.name,role:"enseignant",teacherId,
        login:form.login||emailLower}:a));
    }else if(form.login&&form.password){
      const loginLower=form.login.trim().toLowerCase();
      const loginExists=accounts.find(a=>(a.login||"").toLowerCase()===loginLower);
      if(!loginExists){
        set.setAccounts(p=>[...p,{id:uid(),login:form.login,password:form.password,name:form.name,role:"enseignant",email:emailLower,teacherId}]);
      }else{
        set.setAccounts(p=>p.map(a=>(a.login||"").toLowerCase()===loginLower?{...a,name:form.name,role:"enseignant",teacherId,email:emailLower||a.email}:a));
      }
    }else if(emailLower){
      const emailExists=accounts.find(a=>(a.email||"").toLowerCase()===emailLower);
      if(!emailExists){
        set.setAccounts(p=>[...p,{id:uid(),login:emailLower,password:"(Firebase Auth)",name:form.name,role:"enseignant",email:emailLower,teacherId}]);
      }
    }
    reset();
  };
  return <div className="space-y-5">
    <div className="flex items-center justify-between"><h2 className="text-2xl font-bold">Enseignants</h2>
      <Btn onClick={()=>{reset();setShowAdd(true)}}>＋ Ajouter</Btn></div>
    <div className="space-y-3">{teachers.map(t=>{
      const subs=(t.subjectIds||[]).map(sid=>subjects.find(s=>s.id===sid)?.name).filter(Boolean);
      const assignedClasses=(t.classIds||[]).map(cid=>classes.find(c=>c.id===cid)?.label).filter(Boolean);
      const linkedStudent=students.find(s=>s.id===t.studentId);
      const acc=accounts.find(a=>a.teacherId===t.id);
      return <div key={t.id} className="bg-white rounded-xl border p-4 flex items-center justify-between shadow-sm">
        <div className="flex items-center gap-3">
          <div className="w-10 h-10 rounded-full bg-purple-600 flex items-center justify-center text-white text-sm font-bold">{t.name[0]}</div>
          <div><p className="font-medium">{t.name}</p>
            <div className="flex flex-wrap gap-1 mt-0.5">{subs.map(s=><Badge key={s} color="purple">{s}</Badge>)}</div>
            {assignedClasses.length>0&&<div className="flex flex-wrap gap-1 mt-0.5">{assignedClasses.map(c=><Badge key={c} color="blue">{c}</Badge>)}</div>}
            <p className="text-xs text-gray-400">{t.email} {t.phone&&`/ ${t.phone}`}</p>
            {acc&&<span className="text-xs text-gray-400">🔐 Identifiant: <span className="font-mono bg-gray-100 px-1 rounded">{acc.login}</span></span>}
            {!acc&&<span className="text-xs text-orange-500">⚠ Pas de compte — ne peut pas se connecter</span>}
            {linkedStudent&&<div className="mt-0.5"><Badge color="green">Aussi élève: {linkedStudent.prenom} {linkedStudent.nom}</Badge></div>}</div></div>
        <div className="flex gap-1">
          <button onClick={()=>{const a=accounts.find(a=>a.teacherId===t.id);setForm({name:t.name,subjectIds:t.subjectIds||[],classIds:t.classIds||[],phone:t.phone||"",email:t.email||"",studentId:t.studentId||"",login:a?.login||"",password:a?.password||""});setEditId(t.id)}} className="p-2 hover:bg-gray-100 rounded">✏️</button>
          <button onClick={()=>{set.setTeachers(p=>p.filter(x=>x.id!==t.id));set.setAccounts(p=>p.filter(a=>a.teacherId!==t.id))}} className="p-2 hover:bg-red-50 rounded text-red-400">🗑</button></div></div>})}</div>
    <Modal open={showAdd||!!editId} onClose={reset} title={editId?"Modifier l'enseignant":"Nouvel enseignant"} wide>
      <div className="space-y-3">
        <Inp label="Nom complet *" value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/>
        <div className="grid grid-cols-2 gap-3"><Inp label="Email" value={form.email} onChange={e=>setForm({...form,email:e.target.value})}/><Inp label="Téléphone" value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})}/></div>
        <div className="p-3 bg-blue-50 rounded-lg border border-blue-200">
          <p className="text-xs font-bold text-blue-800 mb-2">🔐 Accès à l'application (obligatoire pour que l'enseignant puisse se connecter)</p>
          <div className="grid grid-cols-2 gap-3">
            <Inp label="Identifiant de connexion" value={form.login} onChange={e=>setForm({...form,login:e.target.value.replace(/\s/g,"")})} placeholder="Ex: prof.ahmed"/>
            <div><label className="block text-xs font-medium text-gray-600 mb-1">Mot de passe</label>
              <input type="text" value={form.password} onChange={e=>setForm({...form,password:e.target.value})} className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm font-mono outline-none" placeholder="Ex: elfaouz2025"/></div>
          </div>
          <p className="text-[10px] text-blue-600 mt-1">L'enseignant ne verra que ses classes affectées ci-dessous (appel, notes, bulletins)</p>
        </div>
        <div><label className="block text-xs font-medium text-gray-600 mb-1">Matières enseignées</label>
          <div className="flex flex-wrap gap-1">{subjects.map(s=>{const sel=(form.subjectIds||[]).includes(s.id);
            return <button key={s.id} type="button" onClick={()=>setForm(p=>({...p,subjectIds:sel?p.subjectIds.filter(x=>x!==s.id):[...p.subjectIds,s.id]}))}
              className={`px-2 py-1 rounded text-xs border ${sel?"bg-purple-100 border-purple-400":"border-gray-200"}`}>{s.name}{sel&&" ✓"}</button>})}</div></div>
        <div><label className="block text-xs font-medium text-gray-600 mb-1">Classes affectées (l'enseignant ne verra QUE ces classes)</label>
          <div className="flex flex-wrap gap-1 max-h-40 overflow-y-auto">{classes.map(c=>{const sel=(form.classIds||[]).includes(c.id);
            return <button key={c.id} type="button" onClick={()=>setForm(p=>({...p,classIds:sel?p.classIds.filter(x=>x!==c.id):[...(p.classIds||[]),c.id]}))}
              className={`px-2 py-1 rounded text-xs border ${sel?"bg-blue-100 border-blue-400":"border-gray-200"}`}>{c.label}{sel&&" ✓"}</button>})}</div></div>
        <Sel label="Lié à un élève (double profil)" value={form.studentId} onChange={e=>setForm({...form,studentId:e.target.value})} options={[{value:"",label:"— Aucun —"},...students.map(s=>({value:s.id,label:`${s.prenom} ${s.nom}`}))]}/>
        <div className="flex justify-end gap-2 pt-3"><Btn variant="secondary" onClick={reset}>Annuler</Btn><Btn onClick={save}>{editId?"Enregistrer":"Créer"}</Btn></div></div></Modal>
  </div>;
}

/*═══════════════════════════════════════════════════════════════
  LISTE ROUGE (point 4)

function RedlistPage({D,set}){
  const {redlist,user}=D;const isAdmin=user.role==="admin";const [showAdd,setShowAdd]=useState(false);

  return <div className="space-y-5">
    <div className="flex justify-between"><div><h2 className="text-2xl font-bold">Liste Rouge</h2><p className="text-sm text-gray-500">{redlist.length} signalés — Critère: Nom + Prénom + Date de naissance</p></div>
      {isAdmin&&<Btn variant="danger" onClick={()=>setShowAdd(true)}>＋ Ajouter</Btn>}</div>
    {redlist.length===0?<EmptyState icon="🛡" text="Aucun élève en liste rouge"/>:
    <div className="space-y-3">{redlist.map(r=>
      <div key={r.id} className="bg-white rounded-xl border-l-4 border-red-500 p-4 flex justify-between items-start shadow-sm">
        <div><p className="font-bold">⚠️ {r.prenom||""} {r.nom||r.studentName||""} {r.dob?<span className="text-xs text-gray-500 font-normal">({r.dob})</span>:""}</p><div className="flex gap-2 mt-1"><Badge color="red">{r.reason}</Badge><span className="text-xs text-gray-400">{r.addedAt} — {r.addedBy}</span></div>
          {r.detail&&<p className="text-sm text-gray-600 mt-1">{r.detail}</p>}</div>
        {isAdmin&&<button onClick={()=>set.setRedlist(p=>p.filter(x=>x.id!==r.id))} className="p-1.5 hover:bg-red-50 rounded text-red-400">🗑</button>}</div>)}</div>}
    <Modal open={showAdd} onClose={()=>setShowAdd(false)} title="Ajouter à la liste rouge">
      <div className="space-y-3">
        <div className="grid grid-cols-3 gap-3">
          <Inp label="Nom *" value={form.nom} onChange={e=>setForm({...form,nom:e.target.value})}/>
          <Inp label="Prénom *" value={form.prenom} onChange={e=>setForm({...form,prenom:e.target.value})}/>
          <Inp label="Date de naissance *" type="date" value={form.dob} onChange={e=>setForm({...form,dob:e.target.value})}/>
        </div>
        <p className="text-xs text-gray-500">⚠ Le blocage se fait sur la combinaison exacte Nom + Prénom + Date de naissance pour éviter les homonymes</p>
        <Sel label="Motif" value={form.reason} onChange={e=>setForm({...form,reason:e.target.value})} options={reasons.map(r=>({value:r,label:r}))}/>
        <div><label className="block text-xs font-medium text-gray-600 mb-1">Détail</label><textarea value={form.detail} onChange={e=>setForm({...form,detail:e.target.value})} rows={3} className="w-full px-3 py-2 border rounded-lg text-sm outline-none"/></div>
        <div className="flex justify-end gap-2 pt-3"><Btn variant="secondary" onClick={()=>setShowAdd(false)}>Annuler</Btn>
          <Btn variant="danger" onClick={()=>{if(form.nom&&form.prenom&&form.dob){set.setRedlist(p=>[...p,{id:uid(),nom:form.nom,prenom:form.prenom,dob:form.dob,reason:form.reason,detail:form.detail,addedBy:user.name,addedAt:today()}]);setShowAdd(false);setForm({nom:"",prenom:"",dob:"",reason:"Absences répétées",detail:""})}else{alert("Les 3 champs sont obligatoires")}}}>Ajouter</Btn></div></div></Modal>
  </div>;
}

/*═══════════════════════════════════════════════════════════════
  EMPLOI DU TEMPS
═══════════════════════════════════════════════════════════════*/
function EdtPage({D,set}){
  const {edt,classes,teachers,students,enrollments,user}=D;
  const [tab,setTab]=useState("planning");const [showAdd,setShowAdd]=useState(false);const [showImport,setShowImport]=useState(false);
  const [form,setForm]=useState({jour:"Samedi",heureDebut:"09:00",heureFin:"11:00",classId:"",teacherIds:[],salle:"SALLE 1"});
  const jours=["Mercredi","Samedi","Dimanche"];const salles=["SALLE 1","SALLE 2","SALLE 3","SALLE 4","SALLE 5","SALLE 6"];
  const sorted=[...edt].sort((a,b)=>{const jo={"Mercredi":0,"Samedi":1,"Dimanche":2};return(jo[a.jour]||0)-(jo[b.jour]||0)||(a.heureDebut||"").localeCompare(b.heureDebut||"")});
  const [yearStart,setYearStart]=useState("2025-09-01");const [yearEnd,setYearEnd]=useState("2026-06-30");
  const [vacances,setVacances]=useState(D.vacances||[]);// [{debut,fin,label}]
  const [showVac,setShowVac]=useState(false);const [vacForm,setVacForm]=useState({debut:"",fin:"",label:""});

  function addSlot(){if(!form.classId)return;set.setEdt(p=>[...p,{id:uid(),...form}]);setForm({jour:"Samedi",heureDebut:"09:00",heureFin:"11:00",classId:"",teacherIds:[],salle:"SALLE 1"});setShowAdd(false)}
  function delSlot(id){set.setEdt(p=>p.filter(e=>e.id!==id))}

  function isInVacances(dateStr){return vacances.some(v=>dateStr>=v.debut&&dateStr<=v.fin)}
  const jourToDay={"Dimanche":0,"Lundi":1,"Mardi":2,"Mercredi":3,"Jeudi":4,"Vendredi":5,"Samedi":6};

  function dupliquerAnnee(slot){
    const dayTarget=jourToDay[slot.jour];if(dayTarget===undefined)return;
    const start=new Date(yearStart);const end=new Date(yearEnd);const dates=[];
    let d=new Date(start);
    // Find first occurrence of target day
    while(d.getDay()!==dayTarget&&d<=end){d.setDate(d.getDate()+1)}
    while(d<=end){const ds=d.toISOString().slice(0,10);
      if(!isInVacances(ds)){dates.push(ds)}
      d.setDate(d.getDate()+7)}
    const newSlots=dates.map(dt=>({id:uid(),jour:slot.jour,heureDebut:slot.heureDebut,heureFin:slot.heureFin,classId:slot.classId,teacherIds:slot.teacherIds,salle:slot.salle,date:dt}));
    set.setEdt(p=>[...p.filter(e=>e.id!==slot.id),...newSlots]);
    alert(`${newSlots.length} creneaux generes du ${yearStart} au ${yearEnd} (${vacances.length} periodes de vacances exclues)`);}

  function addVacance(){if(!vacForm.debut||!vacForm.fin)return;
    const newVac=[...vacances,{...vacForm}];setVacances(newVac);set.setVacances&&set.setVacances(newVac);setVacForm({debut:"",fin:"",label:""});}

  // Import EDT from pasted Excel
  function importEdt(text){const lines=text.trim().split("\n").filter(l=>l.trim());let count=0;
    lines.forEach(l=>{const cols=l.split("\t");if(cols.length<4)return;
      const jour=cols[0]?.trim();const hd=cols[1]?.trim();const hf=cols[2]?.trim();const classeName=cols[3]?.trim();
      const salle=cols[4]?.trim()||"SALLE 1";const profName=cols[5]?.trim()||"";
      const cl=classes.find(c=>c.label.toLowerCase().includes(classeName.toLowerCase())||c.code.toLowerCase()===classeName.toLowerCase());
      const tIds=profName?teachers.filter(t=>t.name.toLowerCase().includes(profName.toLowerCase())).map(t=>t.id):[];
      if(cl){set.setEdt(p=>[...p,{id:uid(),jour,heureDebut:hd,heureFin:hf,classId:cl.id,teacherIds:tIds,salle}]);count++}});
    alert(`${count} creneaux importes !`);setShowImport(false)}

  // Get students for a slot (for roll call)
  function getSlotStudents(slot){
    return enrollments.filter(e=>e.classId===slot.classId&&e.status==="Inscription acceptée").map(e=>students.find(s=>s.id===e.studentId)).filter(Boolean)}

  return <div className="space-y-5">
    <div className="flex items-center justify-between"><h2 className="text-2xl font-bold">Emploi du temps</h2>
      <div className="flex gap-2"><Btn variant="secondary" onClick={()=>setShowImport(true)}>📥 Import Excel</Btn><Btn onClick={()=>setShowAdd(true)}>＋ Créneau</Btn></div></div>
    <Tabs tabs={[{id:"planning",label:"Planning"},{id:"jour",label:"Par jour"},{id:"annee",label:"Annee scolaire"},{id:"vacances",label:`Vacances (${vacances.length})`}]} active={tab} onChange={setTab}/>

    {tab==="annee"&&<div className="space-y-4 bg-white rounded-xl border shadow-sm p-5">
      <h3 className="text-sm font-bold">Generer les dates annuelles</h3>
      <p className="text-xs text-gray-500">Selectionnez un creneau hebdomadaire et generez toutes ses occurrences sur l'annee, en excluant les vacances.</p>
      <div className="grid grid-cols-2 gap-3"><Inp label="Debut annee" type="date" value={yearStart} onChange={e=>setYearStart(e.target.value)}/><Inp label="Fin annee" type="date" value={yearEnd} onChange={e=>setYearEnd(e.target.value)}/></div>
      {vacances.length>0&&<p className="text-xs text-orange-600">{vacances.length} periode(s) de vacances exclues</p>}
      <p className="text-xs font-medium text-gray-700 mt-2">Creneaux a dupliquer :</p>
      <div className="space-y-1">{sorted.filter(s=>!s.date).map(s=>{const cl=classes.find(c=>c.id===s.classId);
        return <div key={s.id} className="flex items-center justify-between p-2 bg-gray-50 rounded text-sm">
          <span>{s.jour} {s.heureDebut}-{s.heureFin} — {cl?.label||"--"} ({s.salle})</span>
          <Btn size="sm" onClick={()=>dupliquerAnnee(s)}>Generer dates</Btn></div>})}
        {sorted.filter(s=>!s.date).length===0&&<p className="text-xs text-gray-400">Aucun creneau hebdomadaire. Creez d'abord des creneaux sans date.</p>}</div>
      <div className="pt-3 border-t text-xs text-gray-400"><strong>{edt.filter(s=>s.date).length}</strong> creneaux dates generes au total</div>
    </div>}

    {tab==="vacances"&&<div className="space-y-4 bg-white rounded-xl border shadow-sm p-5">
      <h3 className="text-sm font-bold">Periodes de vacances scolaires</h3>
      <p className="text-xs text-gray-500">Les creneaux generes excluront automatiquement ces periodes.</p>
      {vacances.length>0&&<div className="space-y-1">{vacances.map((v,i)=>
        <div key={i} className="flex items-center justify-between p-2 bg-orange-50 rounded text-sm">
          <span>{v.label||"Vacances"} : {v.debut} au {v.fin}</span>
          <button onClick={()=>{const nv=vacances.filter((_,j)=>j!==i);setVacances(nv);set.setVacances&&set.setVacances(nv)}} className="text-red-400 text-xs hover:text-red-600">Supprimer</button>
        </div>)}</div>}
      <div className="grid grid-cols-3 gap-3">
        <Inp label="Debut" type="date" value={vacForm.debut} onChange={e=>setVacForm({...vacForm,debut:e.target.value})}/>
        <Inp label="Fin" type="date" value={vacForm.fin} onChange={e=>setVacForm({...vacForm,fin:e.target.value})}/>
        <Inp label="Libelle" value={vacForm.label} onChange={e=>setVacForm({...vacForm,label:e.target.value})} placeholder="Ex: Toussaint"/></div>
      <Btn size="sm" onClick={addVacance}>Ajouter une periode</Btn>
    </div>}

    {tab==="planning"&&<div className="bg-white rounded-xl border shadow-sm overflow-x-auto">
      <table className="w-full text-sm"><thead><tr className="bg-gray-50 border-b">
        <th className="text-left px-4 py-3 font-semibold text-gray-600">Jour</th>
        <th className="text-left px-4 py-3 font-semibold text-gray-600">Horaire</th>
        <th className="text-left px-4 py-3 font-semibold text-gray-600">Classe</th>
        <th className="text-left px-4 py-3 font-semibold text-gray-600">Enseignant(s)</th>
        <th className="text-left px-4 py-3 font-semibold text-gray-600">Salle</th>
        <th className="text-left px-4 py-3 font-semibold text-gray-600">Eleves</th>
        <th className="text-right px-4 py-3"></th>
      </tr></thead><tbody className="divide-y divide-gray-100">{sorted.map(s=>{
        const cl=classes.find(c=>c.id===s.classId);const profs=(s.teacherIds||[]).map(tid=>teachers.find(t=>t.id===tid)?.name).filter(Boolean);
        const stCount=getSlotStudents(s).length;
        return <tr key={s.id} className="hover:bg-gray-50/50">
          <td className="px-4 py-2"><Badge color={s.jour==="Mercredi"?"blue":s.jour==="Samedi"?"green":"purple"}>{s.jour}</Badge>{s.date&&<span className="text-xs text-gray-500 ml-1">{s.date}</span>}</td>
          <td className="px-4 py-2 font-mono text-xs">{s.heureDebut} - {s.heureFin}</td>
          <td className="px-4 py-2 font-medium">{cl?.label||"--"}</td>
          <td className="px-4 py-2 text-xs">{profs.length>0?profs.join(", "):<span className="text-gray-300">Non affecte</span>}</td>
          <td className="px-4 py-2 text-xs">{s.salle}</td>
          <td className="px-4 py-2"><Badge color="gray">{stCount} eleves</Badge></td>
          <td className="px-4 py-2 text-right"><button onClick={()=>delSlot(s.id)} className="p-1 hover:bg-red-50 rounded text-red-400 text-xs">🗑</button></td>
        </tr>})}</tbody></table></div>}

    {tab==="jour"&&<div className="space-y-6">{jours.map(jour=>{const slots=sorted.filter(s=>s.jour===jour);
      return <div key={jour}><h3 className="text-sm font-bold mb-2">{jour} ({slots.length} creneaux)</h3>
        {slots.length===0?<p className="text-xs text-gray-400">Aucun cours</p>:
        <div className="space-y-2">{slots.map(s=>{const cl=classes.find(c=>c.id===s.classId);const profs=(s.teacherIds||[]).map(tid=>teachers.find(t=>t.id===tid)?.name).filter(Boolean);
          const slotStudents=getSlotStudents(s);
          return <div key={s.id} className="bg-white rounded-lg border p-3">
            <div className="flex justify-between items-start">
              <div><p className="font-medium">{s.heureDebut}-{s.heureFin} — {cl?.label||"--"} <span className="text-xs text-gray-400">({s.salle})</span></p>
                <p className="text-xs text-gray-500">Enseignant(s): {profs.join(", ")||"--"}</p></div>
              <Badge color="gray">{slotStudents.length} eleves</Badge></div>
            {slotStudents.length>0&&<div className="mt-2 text-xs text-gray-600 grid grid-cols-3 gap-1">{slotStudents.map(st=>
              <span key={st.id} className="bg-gray-50 rounded px-1.5 py-0.5">{st.prenom} {st.nom}</span>)}</div>}
          </div>})}</div>}</div>})}</div>}

    <Modal open={showAdd} onClose={()=>setShowAdd(false)} title="Nouveau creneau">
      <div className="space-y-3">
        <div className="grid grid-cols-3 gap-3">
          <Sel label="Jour" value={form.jour} onChange={e=>setForm({...form,jour:e.target.value})} options={jours.map(j=>({value:j,label:j}))}/>
          <Inp label="Heure debut" type="time" value={form.heureDebut} onChange={e=>setForm({...form,heureDebut:e.target.value})}/>
          <Inp label="Heure fin" type="time" value={form.heureFin} onChange={e=>setForm({...form,heureFin:e.target.value})}/></div>
        <Sel label="Classe" value={form.classId} onChange={e=>setForm({...form,classId:e.target.value})} options={[{value:"",label:"-- Choisir --"},...classes.map(c=>({value:c.id,label:c.label}))]}/>
        <Sel label="Salle" value={form.salle} onChange={e=>setForm({...form,salle:e.target.value})} options={salles.map(s=>({value:s,label:s}))}/>
        <div><label className="block text-xs font-medium text-gray-600 mb-1">Enseignant(s)</label>
          <div className="flex flex-wrap gap-1">{teachers.map(t=>{const sel=(form.teacherIds||[]).includes(t.id);
            return <button key={t.id} type="button" onClick={()=>setForm(p=>({...p,teacherIds:sel?p.teacherIds.filter(x=>x!==t.id):[...p.teacherIds,t.id]}))}
              className={`px-2 py-1 rounded text-xs border ${sel?"bg-purple-100 border-purple-400":"border-gray-200"}`}>{t.name}{sel&&" ✓"}</button>})}</div></div>

    const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=filename;a.click()}

function App(){
  const [user,setUser]=useState(null);const [page,setPage]=useState("dashboard");const [loading,setLoading]=useState(true);
  const [classes,setClasses]=useState(SEED_CLASSES);const [students,setStudents]=useState([]);const [enrollments,setEnrollments]=useState([]);
  const [invoices,setInvoices]=useState([]);const [redlist,setRedlist]=useState([]);const [accounts,setAccounts]=useState(SEED_ACCOUNTS);
  const [teachers,setTeachers]=useState(SEED_TEACHERS);const [subjects,setSubjects]=useState(SEED_SUBJECTS);const [grades,setGrades]=useState([]);
  const [absences,setAbsences]=useState([]);const [teacherAbsences,setTeacherAbsences]=useState([]);const [sanctions,setSanctions]=useState([]);const [emailHistory,setEmailHistory]=useState([]);const [edt,setEdt]=useState([]);const [vacances,setVacances]=useState([]);const [tarifs,setTarifs]=useState(DEFAULT_TARIFS);const [remises,setRemises]=useState(DEFAULT_REMISES);
  const [bulletinComments,setBulletinComments]=useState({});// {classId_T1: {comments:{},decisions:{}}}
  const [trimDates,setTrimDates]=useState({t1:{debut:"2025-09-01",fin:"2025-12-20"},t2:{debut:"2026-01-05",fin:"2026-03-28"},t3:{debut:"2026-03-29",fin:"2026-06-30"}});
  const [dbMode,setDbMode]=useState(()=>DB.isConfigured()?"firebase":"local");
  const [showFBSetup,setShowFBSetup]=useState(false);
  const [dbStatus,setDbStatus]=useState("");
  const [remoteListening,setRemoteListening]=useState(false);
  const _lastWriteId=React.useRef(null);

  const [fbReady,setFbReady]=useState(false); // true quand Firebase Auth est confirmé connecté

  function applyData(d){
    if(!d)return;
    d.classes&&setClasses(d.classes);d.students&&setStudents(d.students);d.enrollments&&setEnrollments(d.enrollments);
    d.invoices&&setInvoices(d.invoices);d.redlist&&setRedlist(d.redlist);d.accounts&&setAccounts(d.accounts);
    d.teachers&&setTeachers(d.teachers);d.subjects&&setSubjects(d.subjects);d.grades&&setGrades(d.grades);
    d.absences&&setAbsences(d.absences);d.teacherAbsences&&setTeacherAbsences(d.teacherAbsences);d.sanctions&&setSanctions(d.sanctions);d.emailHistory&&setEmailHistory(d.emailHistory);d.edt&&setEdt(d.edt);d.vacances&&setVacances(d.vacances);d.tarifs&&setTarifs(d.tarifs);d.remises&&setRemises(d.remises);d.trimDates&&setTrimDates(d.trimDates);
    d.bulletinComments&&setBulletinComments(d.bulletinComments);
  }

  // Initial load: Firebase first, fallback to localStorage
  useEffect(()=>{
    async function init(){
      // S'assurer que Firebase est initialisé (important sur mobile)
      ensureFirebaseInit();
      if(DB.isConfigured()&&_auth){
        setDbMode("firebase");
        setDbStatus("Connexion…");
        // Étape 1 : attendre que Firebase Auth confirme l'état de session
        const fbUser = await new Promise(resolve=>{
          const unsub=_auth.onAuthStateChanged(u=>{unsub();resolve(u);});
        });
        if(fbUser){
          // Étape 2 : forcer refresh du token AVANT toute lecture Firestore
          try{await fbUser.getIdToken(true)}catch(e){}
          // Étape 3 : UNE SEULE lecture Firestore
          setDbStatus("Chargement des données…");
          let remoteData=await DB.load();
          const localData=LS.get("data",null);
          // Étape 4 : si Firestore est vide, pousser les données locales
          if(!remoteData && localData){
            setDbStatus("⬆️ Première sync Firebase…");
            await DB.save(localData);
            remoteData=localData;
          }
          if(remoteData) applyData(remoteData);
          // Étape 5 : résoudre le profil avec les données fraîches
          const profile=await resolveUserProfile(fbUser, remoteData||localData);
          setUser(profile);
          setDbStatus("✅ Synchronisé");
          setFbReady(true); // Auth confirmé → activer le listener temps réel
        } else {
          // Non connecté — afficher la page de connexion
          const localData=LS.get("data",null);
          if(localData) applyData(localData);
          setDbStatus("");
        }
      } else {
        setDbMode("local");
        const u=LS.get("user",null);if(u)setUser(u);
        const d=LS.get("data",null);if(d)applyData(d);
        setDbStatus("");
      }
      setLoading(false);
    }
    init();
  },[]);

  // Real-time listener — lancé UNIQUEMENT après confirmation Firebase Auth
  // (onSnapshot échoue silencieusement si l'utilisateur n'est pas encore authentifié)
  useEffect(()=>{
    if(!fbReady||!DB.isConfigured())return;
    console.log("🔥 Listener Firestore démarré");
    const unsub=DB.listen((remoteData)=>{
      // Ignorer le snapshot de NOTRE propre écriture (eviter boucle)
      if(remoteData._writeId&&remoteData._writeId===_lastWriteId.current)return;
      // Ecriture d'un autre utilisateur → appliquer immédiatement
      console.log("📡 Mise à jour reçue d'un autre utilisateur");
      applyData(remoteData);
      setDbStatus("🔄 Mis à jour en temps réel");
      setTimeout(()=>setDbStatus("✅ Firebase synchronisé"),3000);
    });
    setRemoteListening(true);
    return()=>{console.log("🔥 Listener Firestore arrêté");unsub();setRemoteListening(false)};
  },[fbReady]);

  // Save data: localStorage + Firebase
  const allData={classes,students,enrollments,invoices,redlist,accounts,teachers,subjects,grades,absences,teacherAbsences,sanctions,emailHistory,edt,vacances,tarifs,remises,trimDates,bulletinComments};
  const saveTimer=React.useRef(null);
  const prevAccounts=React.useRef(null);

  // References pour detecter changements critiques
  const prevEnrollments=React.useRef(null);
  const prevClasses=React.useRef(null);
  const prevStudents=React.useRef(null);

  // Sauvegarde Firebase: immediate pour donnees critiques (quotas/inscriptions), debounce 1200ms pour le reste
  useEffect(()=>{
    if(loading)return;
    LS.set("data",allData);
    if(dbMode==="firebase"&&DB.isConfigured()){
      const enrollmentsChanged=JSON.stringify(enrollments)!==JSON.stringify(prevEnrollments.current);
      const classesChanged=JSON.stringify(classes)!==JSON.stringify(prevClasses.current);
      const studentsChanged=JSON.stringify(students)!==JSON.stringify(prevStudents.current);
      const accountsChanged=JSON.stringify(accounts)!==JSON.stringify(prevAccounts.current);
      prevEnrollments.current=enrollments;
      prevClasses.current=classes;
      prevStudents.current=students;
      prevAccounts.current=accounts;
      if(enrollmentsChanged||classesChanged||studentsChanged||accountsChanged){
        clearTimeout(saveTimer.current);
        const wid=uid();_lastWriteId.current=wid;
        setDbStatus("⬆️ Sync…");
        DB.save(allData,wid).then(ok=>{
          setDbStatus(ok?"✅ Synchronisé":"⚠️ Erreur sauvegarde");
        });
        return;
      }
      // Donnees non-critiques: debounce 1200ms
      clearTimeout(saveTimer.current);
      saveTimer.current=setTimeout(async()=>{
        const wid=uid();_lastWriteId.current=wid;
        setDbStatus("⬆️ Sauvegarde…");
        const ok=await DB.save(allData,wid);
        setDbStatus(ok?"✅ Synchronisé":"⚠️ Erreur sauvegarde");
      },1200);
    }
  },[classes,students,enrollments,invoices,redlist,accounts,teachers,subjects,grades,absences,teacherAbsences,sanctions,emailHistory,edt,vacances,tarifs,trimDates,bulletinComments,loading]);

  const handleLogin=(u)=>{
    setUser(u);
    LS.set("user",u);
    // Si Firebase Auth est actif et l'utilisateur a un uid Firebase, activer le listener
    if(DB.isConfigured()&&_auth?.currentUser){
      setFbReady(true);
    }
    setPage(u.role==="enseignant"?"viescolaire":u.role==="benevole"?"inscriptions":"dashboard");
  };
  const handleLogout=async()=>{
    if(AUTH.isConfigured())await AUTH.signOut();
    setUser(null);LS.set("user",null);setFbReady(false);
  };

  if(loading)return <div className="min-h-screen flex items-center justify-center bg-gray-50"><div className="text-center"><div className="w-10 h-10 border-4 border-emerald-200 border-t-emerald-700 rounded-full animate-spin mx-auto mb-3"/><p className="text-gray-500">{dbMode==="firebase"?"Connexion à Firebase…":"Chargement…"}</p></div></div>;
  if(!user)return <LoginPage onLogin={handleLogin} accounts={accounts}/>;


  const D={classes,students,enrollments,invoices,redlist,accounts,teachers,subjects,grades,absences,teacherAbsences,sanctions,emailHistory,edt,vacances,tarifs,remises,trimDates,user,bulletinComments};
  const set={setClasses,setStudents,setEnrollments,setInvoices,setRedlist,setAccounts,setTeachers,setSubjects,setGrades,setAbsences,setTeacherAbsences,setSanctions,setEmailHistory,setEdt,setVacances,setTarifs,setRemises,setTrimDates,setBulletinComments};
  const notifCount=absences.filter(a=>!a.notified&&(a.type==="absent_injustifie"||a.type==="absent")&&!a.justified).length;

  return <div className="min-h-screen bg-gray-50">
    {showFBSetup&&<FirebaseSetupModal onClose={()=>setShowFBSetup(false)} onConfigured={()=>{setDbMode("firebase");setDbStatus("✅ Firebase activé !")}}/>}
    <Sidebar page={page} setPage={setPage} user={user} onLogout={handleLogout} notifCount={notifCount}/>
    {/* DB Status bar */}
    <div className="ml-56 sticky top-0 z-40 bg-white border-b border-gray-100 px-4 py-1.5 flex items-center justify-between gap-3 text-xs">
      <div className="flex items-center gap-2">
        <span className={`w-2 h-2 rounded-full ${remoteListening?"bg-emerald-500 animate-pulse":dbMode==="firebase"?"bg-amber-400":"bg-gray-300"}`}/>
        <span className="text-gray-500">
          {remoteListening?"Temps réel actif 📡":dbMode==="firebase"?"Firebase (connexion…)":"Stockage local (non partagé)"}
        </span>
        {dbStatus&&<span className="text-gray-400">{dbStatus}</span>}
      </div>
      {dbMode==="local"&&user.role==="admin"&&<button onClick={()=>setShowFBSetup(true)} className="text-emerald-700 font-semibold hover:underline">⚡ Activer la base partagée (Firebase) →</button>}
      {dbMode==="firebase"&&user.role==="admin"&&<div className="flex items-center gap-3 flex-wrap">
        <span className="text-gray-400 text-xs">🔐 Firebase actif</span>
        <button onClick={async()=>{
          setDbStatus("⬆️ Sync en cours…");
          try{
            const fbUser=_auth?.currentUser;
            if(!fbUser){
              setDbStatus("⚠️ Connectez-vous avec un compte Firebase (email) pour synchroniser");
              return;
            }
            await fbUser.getIdToken(true);
            const d={classes,students,enrollments,invoices,redlist,accounts,teachers,subjects,
              grades,absences,teacherAbsences,sanctions,emailHistory,edt,vacances,tarifs,trimDates,bulletinComments};
            const wid=uid();
            const ok=await DB.save({...d,_writeId:wid});
            if(ok){LS.set("data",d);setDbStatus("✅ Données synchronisées — "+accounts.length+" comptes dans Firebase");}
            else{setDbStatus("⚠️ Échec Firestore — token: "+(fbUser?fbUser.email:"non connecté"));}
          }catch(e){setDbStatus("⚠️ Erreur : "+e.message);}
        }} className="text-blue-600 text-xs font-semibold hover:underline">
          🔄 Forcer sync
        </button>
        <button onClick={()=>setShowFBSetup(true)} className="text-gray-400 text-xs hover:text-gray-700 hover:underline">
          ⚙️ Config Firebase
        </button>
        <button onClick={async()=>{
          try{
            const cfg=getFBConfig()||EMBEDDED_FIREBASE_CONFIG;
            if(!cfg||!cfg.apiKey){alert("Config Firebase introuvable. Utilisez ⚙️ Config Firebase d'abord.");return}
            // Fetch le fichier source depuis l'URL courante (plus fiable que outerHTML)
            const url=window.location.href.split('?')[0].split('#')[0];
            let htmlSrc;
            try{
              const resp=await fetch(url);
              htmlSrc=await resp.text();
            }catch(e){
              // Fallback sur outerHTML si fetch échoue (fichier local)
              htmlSrc=document.documentElement.outerHTML;
            }
            const marker='const EMBEDDED_FIREBASE_CONFIG = {"apiKey": "AIzaSyDdOCufOBjHXt0Har5emvo-S1kFY907pOs", "authDomain": "elfaouz-3f202.firebaseapp.com", "projectId": "elfaouz-3f202", "storageBucket": "elfaouz-3f202.firebasestorage.app", "messagingSenderId": "688822638334", "appId": "1:688822638334:web:9826811fb85d49b57137af"}; // FIREBASE_CONFIG_PLACEHOLDER';
            if(!htmlSrc.includes(marker)){
              // Déjà configuré — remplacer la config existante
              const patched=htmlSrc.replace(
                /const EMBEDDED_FIREBASE_CONFIG = \{[^;]+\}; \/\/ FIREBASE_CONFIG_PLACEHOLDER/,
                'const EMBEDDED_FIREBASE_CONFIG = '+JSON.stringify(cfg)+'; // FIREBASE_CONFIG_PLACEHOLDER'
              );
              const blob=new Blob([patched],{type:'text/html'});
              const a=document.createElement('a');a.href=URL.createObjectURL(blob);
              a.download='Institut_El_Faouz_configured.html';a.click();URL.revokeObjectURL(a.href);
              return;
            }
            const patched=htmlSrc.replace(marker,
              'const EMBEDDED_FIREBASE_CONFIG = '+JSON.stringify(cfg)+'; // FIREBASE_CONFIG_PLACEHOLDER'
            );
            if(patched===htmlSrc){alert("Erreur: le marqueur de config n'a pas été trouvé dans le fichier.");return}
            const blob=new Blob([patched],{type:'text/html'});
            const a=document.createElement('a');a.href=URL.createObjectURL(blob);
            a.download='Institut_El_Faouz_configured.html';a.click();URL.revokeObjectURL(a.href);
            alert("✅ Fichier téléchargé avec la config Firebase intégrée !");
          }catch(e){alert("Erreur: "+e.message)}
        }} className="text-amber-600 text-xs font-semibold hover:underline">
          ⬇️ Télécharger
        </button>
      </div>}
    </div>
    <div className="ml-56 p-6 min-h-screen">
      {page==="dashboard"&&<DashboardPage D={D}/>}
      {page==="inscriptions"&&<InscriptionsPage D={D} set={set}/>}
      {page==="classes"&&<ClassesPage D={D} set={set}/>}
      {page==="payments"&&<PaymentsPage D={D} set={set}/>}
      {page==="viescolaire"&&<VieScolairePage D={D} set={set}/>}
      {page==="sanctions"&&<SanctionsPage D={D} set={set}/>}
      {page==="notes"&&<NotesPage D={D} set={set}/>}
      {page==="edt"&&<EdtPage D={D} set={set}/>}
      {page==="teachers"&&<TeachersPage D={D} set={set}/>}
      {page==="redlist"&&<RedlistPage D={D} set={set}/>}
      {page==="reports"&&<ReportsPage D={D}/>}
      {page==="settings"&&<SettingsPage D={D} set={set}/>}
    </div></div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
